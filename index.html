<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ctrl12 Login</title>
<style>
body { font-family: Arial; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #1976D2; }
.box { background: white; padding: 40px; border-radius: 8px; width: 350px; }
input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
button { width: 100%; padding: 10px; background: #1976D2; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
.error { color: red; font-size: 12px; margin-top: 10px; }
</style>
</head>
<body>
<div class="box">
<h2>Ctrl12 Login</h2>
<form id="login">
<input type="email" id="email" placeholder="Email" required>
<input type="password" id="password" placeholder="Password" required>
<button type="submit">Ingresar</button>
<div class="error" id="error"></div>
</form>
</div>

<script src="https://www.gstatic.com/firebasejs/10.3.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.3.1/firebase-auth-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyBSIO3eWIlMTtea1j6aQGuW9W-wF6r-Zdk",
  authDomain: "pluo-compact-cef5og.firebaseapp.com",
  projectId: "pluo-compact-cef5og",
  storageBucket: "pluo-compact-cef5og.firebasestorage.app",
  messagingSenderId: "443227636027",
  appId: "1:443227636027:web:c8459adcd92cec1d23f71e"
});

const auth = firebase.auth();
const form = document.getElementById('login');
const errorDiv = document.getElementById('error');

auth.onAuthStateChanged(function(user) {
  if (user) {
    window.location.href = 'unidades.html';
  }
});

form.addEventListener('submit', function(e) {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  
  auth.signInWithEmailAndPassword(email, password).then(function() {
    window.location.href = 'unidades.html';
  }).catch(function(error) {
    errorDiv.textContent = 'Email o contrasena incorrectos';
  });
});
</script>
</body>
</html>
