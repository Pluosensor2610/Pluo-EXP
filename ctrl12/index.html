<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ctrl12 — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    min-height: 100vh; 
    background: linear-gradient(135deg, #1976D2 0%, #00897B 100%);
    font-family: 'Manrope', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    background: white;
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }
  .logo {
    width: 70px;
    height: 70px;
    background: #00897B;
    border-radius: 50%;
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 700;
    color: white;
  }
  h1 {
    text-align: center;
    font-size: 24px;
    color: #1A2B33;
    margin-bottom: 10px;
  }
  .subtitle {
    text-align: center;
    font-size: 12px;
    color: #6B7C85;
    margin-bottom: 30px;
  }
  .form-group {
    margin-bottom: 16px;
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #1A2B33;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 11px;
    border: 1px solid #B9C2C6;
    border-radius: 8px;
    font-size: 14px;
    font-family: 'Manrope', sans-serif;
  }
  input:focus {
    outline: none;
    border-color: #1976D2;
    box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.1);
  }
  button {
    width: 100%;
    padding: 12px;
    background: #1976D2;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Manrope', sans-serif;
    margin-top: 20px;
  }
  button:hover {
    background: #1565c0;
  }
  button:active {
    opacity: 0.9;
  }
  .error {
    color: #E24C4C;
    font-size: 12px;
    margin-top: 12px;
    text-align: center;
    display: none;
  }
  .error.show {
    display: block;
  }
  .loading {
    text-align: center;
    color: #6B7C85;
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="container">
  <div class="logo">C12</div>
  <h1>Ctrl12</h1>
  <p class="subtitle">Controlador de Riego — 12 Salidas</p>
  
  <form id="form">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="tu@email.com" required>
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" required>
    </div>
    <button type="submit" id="btnLogin">Ingresar</button>
    <div class="error" id="error"></div>
  </form>
</div>

<script src="https://www.gstatic.com/firebasejs/10.3.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.3.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBSIO3eWIlMTtea1j6aQGuW9W-wF6r-Zdk",
  authDomain: "pluo-compact-cef5og.firebaseapp.com",
  projectId: "pluo-compact-cef5og",
  storageBucket: "pluo-compact-cef5og.firebasestorage.app",
  messagingSenderId: "443227636027",
  appId: "1:443227636027:web:c8459adcd92cec1d23f71e"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const form = document.getElementById('form');
const emailInput = document.getElementById('email');
const passwordInput = document.getElementById('password');
const btnLogin = document.getElementById('btnLogin');
const errorDiv = document.getElementById('error');

// Si ya hay usuario logueado, ir a ctrl12
auth.onAuthStateChanged(user => {
  if (user) {
    window.location.href = 'Pluo-EXP/ctrl12/';
  }
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorDiv.classList.remove('show');
  
  const email = emailInput.value.trim();
  const password = passwordInput.value;
  
  btnLogin.disabled = true;
  btnLogin.textContent = 'Ingresando...';
  
  try {
    await auth.signInWithEmailAndPassword(email, password);
    window.location.href = 'Pluo-EXP/ctrl12/';
  } catch (error) {
    errorDiv.textContent = 'Email o contraseña incorrectos';
    errorDiv.classList.add('show');
    btnLogin.disabled = false;
    btnLogin.textContent = 'Ingresar';
  }
});
</script>

</body>
</html>
