<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ctrl12 — Mi Riego</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.10.1/mqtt.min.js"></script>
<style>
/* =====================================================
   TOKENS
   ===================================================== */
:root {
  --azul:        #1565C0;
  --azul-mid:    #1976D2;
  --teal:        #00897B;
  --teal-light:  #E0F2F1;
  --teal-dark:   #00695C;
  --verde:       #2E7D32;
  --alerta:      #C62828;
  --naranja:     #E65100;
  --texto:       #1A2B33;
  --texto-tenue: #6B7C85;
  --fondo:       #F0F4F8;
  --superficie:  #FFFFFF;
  --borde:       #DDE3E9;
  --sombra:      0 2px 12px rgba(0,0,0,0.10);
  --radio:       14px;
}

/* =====================================================
   RESET
   ===================================================== */
*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin: 0; font-family: 'Manrope', sans-serif; color: var(--texto); background: var(--azul); min-height: 100vh; }
button { cursor: pointer; font-family: inherit; }
input, select { font-family: inherit; }
h1,h2,h3,h4 { margin: 0; }
p { margin: 0; }

/* =====================================================
   PANTALLAS
   ===================================================== */
.pantalla { display: none; min-height: 100vh; }
.pantalla.activa { display: block; }

/* =====================================================
   LOGIN
   ===================================================== */
#pantalla-login {
  background: var(--azul);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
#pantalla-login.activa { display: flex; }

.login-card {
  width: 100%;
  max-width: 400px;
  background: var(--superficie);
  border-radius: 20px;
  padding: 44px 36px;
  box-shadow: 0 24px 60px rgba(0,0,0,0.30);
}

.logo-wrap {
  display: flex; justify-content: center; margin-bottom: 20px;
}
.logo-circulo {
  width: 72px; height: 72px; border-radius: 50%;
  background: var(--teal);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-family: 'IBM Plex Mono', monospace;
  font-weight: 600; font-size: 14px; letter-spacing: 0.05em;
}

.login-titulo { font-size: 22px; font-weight: 800; text-align: center; color: var(--texto); }
.login-sub { font-size: 13px; color: var(--texto-tenue); text-align: center; margin: 4px 0 28px; }

.campo { margin-bottom: 18px; }
.campo label { display: block; font-size: 13px; font-weight: 600; color: var(--texto-tenue); margin-bottom: 6px; }
.campo input {
  width: 100%; padding: 14px 16px;
  background: #EEF2F6; border: 2px solid transparent; border-radius: 12px;
  color: var(--texto); font-size: 15px; outline: none;
  transition: border-color 0.15s;
}
.campo input:focus { border-color: var(--teal); background: #fff; }

.btn-primario {
  width: 100%; padding: 15px;
  background: var(--teal); color: #fff;
  border: none; border-radius: 12px;
  font-weight: 700; font-size: 15px;
  transition: background 0.15s;
}
.btn-primario:hover { background: var(--teal-dark); }
.btn-primario:disabled { opacity: 0.5; }

.msg-error {
  display: none; margin-top: 14px; padding: 11px 13px;
  border-radius: 8px; font-size: 13px;
  background: rgba(198,40,40,0.10); border: 1px solid rgba(198,40,40,0.30);
  color: #B71C1C;
}
.msg-error.visible { display: block; }

.estado-cnx {
  text-align: center; margin-top: 20px;
  font-family: 'IBM Plex Mono', monospace; font-size: 11px;
  color: var(--texto-tenue); letter-spacing: 0.05em;
}

/* =====================================================
   APP SHELL (post-login)
   ===================================================== */
#pantalla-app {
  background: var(--fondo);
  min-height: 100vh;
}
#pantalla-app.activa { display: flex; flex-direction: column; }

/* Header */
.app-header {
  background: var(--azul);
  padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.header-titulo {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px; font-weight: 600;
  color: rgba(255,255,255,0.9); letter-spacing: 0.06em;
}
.header-back {
  display: none; align-items: center; gap: 6px;
  color: rgba(255,255,255,0.8); font-size: 13px; font-weight: 600;
  background: none; border: none; padding: 0;
}
.header-back.visible { display: flex; }
.btn-logout {
  background: rgba(255,255,255,0.12); border: none;
  color: rgba(255,255,255,0.8); border-radius: 8px;
  padding: 7px 12px; font-size: 12px; font-weight: 600;
}

.app-body { flex: 1; padding: 20px; max-width: 520px; margin: 0 auto; width: 100%; }

/* =====================================================
   LISTA DE UNIDADES
   ===================================================== */
.seccion-titulo {
  font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
  color: var(--texto-tenue); text-transform: uppercase;
  margin-bottom: 12px; margin-top: 24px;
}
.seccion-titulo:first-child { margin-top: 0; }

.unidad-card {
  background: var(--superficie); border-radius: var(--radio);
  padding: 18px; margin-bottom: 12px;
  box-shadow: var(--sombra); cursor: pointer;
  border: 2px solid transparent;
  transition: border-color 0.15s, box-shadow 0.15s;
  display: flex; align-items: center; gap: 14px;
}
.unidad-card:hover { border-color: var(--teal); }

.unidad-icono {
  width: 44px; height: 44px; border-radius: 10px;
  background: var(--teal-light);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.unidad-icono svg { color: var(--teal); }

.unidad-info { flex: 1; }
.unidad-nombre { font-size: 15px; font-weight: 700; }
.unidad-id {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; color: var(--texto-tenue); margin-top: 2px;
}
.dot-estado {
  width: 10px; height: 10px; border-radius: 50%;
  background: #CCC; flex-shrink: 0;
}
.dot-estado.online { background: var(--verde); box-shadow: 0 0 6px rgba(46,125,50,0.5); }
.dot-estado.timeout { background: var(--alerta); }

.spinner {
  text-align: center; padding: 40px 0;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px; color: var(--texto-tenue);
}

/* =====================================================
   DETALLE DE UNIDAD — TABS
   ===================================================== */
.tabs {
  display: flex; gap: 4px; margin-bottom: 20px;
  background: rgba(0,0,0,0.05); border-radius: 10px; padding: 4px;
}
.tab {
  flex: 1; padding: 9px 6px; border: none; border-radius: 8px;
  background: transparent; font-size: 13px; font-weight: 600;
  color: var(--texto-tenue); transition: all 0.15s;
}
.tab.activo { background: var(--superficie); color: var(--teal); box-shadow: var(--sombra); }

/* =====================================================
   PANEL CONTROL
   ===================================================== */
.card {
  background: var(--superficie); border-radius: var(--radio);
  padding: 18px; margin-bottom: 14px; box-shadow: var(--sombra);
}
.card-titulo {
  font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
  color: var(--texto-tenue); text-transform: uppercase; margin-bottom: 14px;
}

/* Estado en vivo */
.estado-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin-bottom: 14px;
}
.estado-item { background: var(--fondo); border-radius: 10px; padding: 12px; }
.estado-label { font-size: 11px; color: var(--texto-tenue); font-weight: 600; margin-bottom: 4px; }
.estado-valor { font-size: 18px; font-weight: 800; color: var(--texto); }
.estado-valor.grande { font-size: 24px; color: var(--teal); }
.estado-valor.alerta { color: var(--alerta); }

.badge-estado {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 700;
}
.badge-estado.inactivo { background: #E0E0E0; color: #666; }
.badge-estado.regando { background: rgba(0,137,123,0.15); color: var(--teal-dark); }
.badge-estado.pausado { background: rgba(230,81,0,0.12); color: var(--naranja); }
.badge-estado.falla { background: rgba(198,40,40,0.12); color: var(--alerta); }

.dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }

.barra-tiempo {
  height: 6px; background: #E0E0E0; border-radius: 3px; margin-top: 10px; overflow: hidden;
}
.barra-tiempo-fill {
  height: 100%; background: var(--teal); border-radius: 3px;
  transition: width 1s linear;
}

/* Botones de control */
.btns-control { display: flex; gap: 8px; flex-wrap: wrap; }
.btn-ctrl {
  flex: 1; min-width: 80px; padding: 12px 8px;
  border: 2px solid var(--borde); border-radius: 10px;
  background: var(--superficie); font-size: 13px; font-weight: 700;
  color: var(--texto); transition: all 0.15s;
}
.btn-ctrl:hover { border-color: var(--teal); color: var(--teal); }
.btn-ctrl.peligro { border-color: rgba(198,40,40,0.3); color: var(--alerta); }
.btn-ctrl.peligro:hover { background: rgba(198,40,40,0.08); }
.btn-ctrl:disabled { opacity: 0.4; cursor: not-allowed; }

/* Riego manual */
.manual-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.sector-btn {
  padding: 10px 6px; border: 2px solid var(--borde); border-radius: 10px;
  background: var(--superficie); font-size: 12px; font-weight: 700;
  color: var(--texto); text-align: center; transition: all 0.15s;
}
.sector-btn:hover { border-color: var(--teal); color: var(--teal); }
.sector-btn.placa2 { border-style: dashed; }
.sector-btn.activo { background: var(--teal); color: #fff; border-color: var(--teal); }

.fila-minutos {
  display: flex; align-items: center; gap: 10px; margin-top: 12px;
}
.fila-minutos label { font-size: 13px; font-weight: 600; color: var(--texto-tenue); flex-shrink: 0; }
.fila-minutos input {
  width: 80px; padding: 10px 12px;
  background: var(--fondo); border: 2px solid var(--borde); border-radius: 10px;
  font-size: 15px; font-weight: 700; text-align: center; outline: none;
}
.fila-minutos input:focus { border-color: var(--teal); }

/* Historial */
.reg-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid var(--borde);
}
.reg-item:last-child { border-bottom: none; }
.reg-icono {
  width: 36px; height: 36px; border-radius: 8px;
  background: var(--teal-light);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 14px;
}
.reg-info { flex: 1; }
.reg-titulo { font-size: 13px; font-weight: 700; }
.reg-sub { font-size: 11px; color: var(--texto-tenue); margin-top: 2px; }
.reg-dur { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; color: var(--teal); }

/* =====================================================
   PANEL PROGRAMAS
   ===================================================== */
.prog-selector { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.prog-btn {
  padding: 8px 14px; border: 2px solid var(--borde); border-radius: 20px;
  background: var(--superficie); font-size: 13px; font-weight: 700;
  color: var(--texto-tenue); transition: all 0.15s;
}
.prog-btn.activo { border-color: var(--teal); color: var(--teal); background: var(--teal-light); }

.switch-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; border-bottom: 1px solid var(--borde);
}
.switch-label { font-size: 14px; font-weight: 600; }
.switch {
  position: relative; width: 44px; height: 24px;
  cursor: pointer;
}
.switch input { opacity: 0; width: 0; height: 0; }
.switch-track {
  position: absolute; inset: 0; border-radius: 12px;
  background: #CCC; transition: background 0.2s;
}
.switch input:checked + .switch-track { background: var(--teal); }
.switch-thumb {
  position: absolute; top: 3px; left: 3px;
  width: 18px; height: 18px; border-radius: 50%; background: #fff;
  transition: transform 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}
.switch input:checked ~ .switch-thumb { transform: translateX(20px); }

.campo-hora {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 0; border-bottom: 1px solid var(--borde);
}
.campo-hora label { font-size: 14px; font-weight: 600; flex: 1; }
.campo-hora input {
  padding: 8px 12px; width: 90px; text-align: center;
  background: var(--fondo); border: 2px solid var(--borde); border-radius: 10px;
  font-size: 15px; font-weight: 700; outline: none;
}
.campo-hora input:focus { border-color: var(--teal); }

.dias-wrap { display: flex; gap: 6px; padding: 12px 0; flex-wrap: wrap; border-bottom: 1px solid var(--borde); }
.dia-chip {
  padding: 6px 11px; border: 2px solid var(--borde); border-radius: 20px;
  background: var(--superficie); font-size: 12px; font-weight: 700;
  color: var(--texto-tenue); cursor: pointer; transition: all 0.15s; user-select: none;
}
.dia-chip.sel { border-color: var(--teal); background: var(--teal-light); color: var(--teal-dark); }

.sectores-lista { margin-top: 12px; }
.sector-row {
  display: grid; grid-template-columns: 1fr 60px 60px 36px;
  align-items: center; gap: 8px;
  padding: 10px 0; border-bottom: 1px solid var(--borde);
}
.sector-row:last-child { border-bottom: none; }
.sector-nombre { font-size: 13px; font-weight: 600; }
.sector-nombre span { display: block; font-size: 10px; color: var(--texto-tenue); font-weight: 400; }
.dur-input {
  padding: 8px 6px; text-align: center; width: 100%;
  background: var(--fondo); border: 2px solid var(--borde); border-radius: 8px;
  font-size: 14px; font-weight: 700; outline: none;
}
.dur-input:focus { border-color: var(--teal); }
.dur-input:disabled { opacity: 0.4; }
.dur-label { font-size: 10px; color: var(--texto-tenue); text-align: center; margin-top: 2px; }

.btns-prog { display: flex; gap: 10px; margin-top: 16px; }
.btn-sec { flex: 1; padding: 13px; border: 2px solid var(--teal); border-radius: 12px; background: var(--superficie); color: var(--teal); font-weight: 700; font-size: 14px; }
.btn-sec:hover { background: var(--teal-light); }

/* =====================================================
   PANEL SALIDAS (CONFIG)
   ===================================================== */
.salida-row {
  display: grid; grid-template-columns: 36px 1fr 1fr;
  align-items: center; gap: 10px;
  padding: 12px 0; border-bottom: 1px solid var(--borde);
}
.salida-row:last-child { border-bottom: none; }
.salida-num {
  width: 36px; height: 36px; border-radius: 8px;
  background: var(--teal-light); color: var(--teal-dark);
  display: flex; align-items: center; justify-content: center;
  font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 700;
}
.salida-num.p2 { background: #FFF3E0; color: #E65100; }
.salida-campo input, .salida-campo select {
  width: 100%; padding: 9px 10px;
  background: var(--fondo); border: 2px solid var(--borde); border-radius: 8px;
  font-size: 13px; font-weight: 600; outline: none; color: var(--texto);
}
.salida-campo input:focus, .salida-campo select:focus { border-color: var(--teal); }
.salida-sub { font-size: 10px; color: var(--texto-tenue); margin-top: 3px; }

/* =====================================================
   PLACA2 BADGE
   ===================================================== */
.placa2-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 20px;
  background: rgba(230,81,0,0.10); color: var(--naranja);
  font-size: 11px; font-weight: 700; font-family: 'IBM Plex Mono', monospace;
}
.placa2-badge.ok { background: rgba(46,125,50,0.10); color: var(--verde); }

/* =====================================================
   TOAST
   ===================================================== */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: #1A2B33; color: #fff; padding: 12px 20px;
  border-radius: 12px; font-size: 14px; font-weight: 600;
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  transition: transform 0.3s; z-index: 999; white-space: nowrap;
}
.toast.visible { transform: translateX(-50%) translateY(0); }

/* Utilidades */
.mt8 { margin-top: 8px; }
.mt16 { margin-top: 16px; }
.row { display: flex; align-items: center; gap: 10px; }
.flex1 { flex: 1; }
.txt-tenue { color: var(--texto-tenue); font-size: 13px; }
</style>
</head>
<body>

<!-- =====================================================
     PANTALLA LOGIN
     ===================================================== -->
<div id="pantalla-login" class="pantalla activa">
  <div class="login-card">
    <div class="logo-wrap">
      <div class="logo-circulo">CTRL12</div>
    </div>
    <h1 class="login-titulo">Mi Riego</h1>
    <p class="login-sub">Control de riego — 12 salidas</p>

    <form id="formLogin">
      <div class="campo">
        <label for="email">Correo</label>
        <input type="email" id="email" placeholder="tu@correo.com" required autocomplete="email">
      </div>
      <div class="campo">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primario" id="btnLogin">Entrar</button>
      <div class="msg-error" id="msgError"></div>
    </form>
    <div class="estado-cnx" id="estadoCnx">conectando…</div>
  </div>
</div>

<!-- =====================================================
     PANTALLA APP
     ===================================================== -->
<div id="pantalla-app" class="pantalla">

  <!-- Header -->
  <div class="app-header">
    <button class="header-back" id="btnBack">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      Unidades
    </button>
    <span class="header-titulo" id="headerTitulo">CTRL12</span>
    <button class="btn-logout" id="btnLogout">Salir</button>
  </div>

  <div class="app-body" id="appBody">
    <div class="spinner">Cargando…</div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- =====================================================
     FIREBASE + LÓGICA
     ===================================================== -->
<script type="module">
import { initializeApp }             from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut }
                                     from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, getDocs, collection, setDoc, query, where }
                                     from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ---------- CONFIG FIREBASE ---------- */
const firebaseConfig = {
  apiKey:            "AIzaSyBSIO3eWIlMTtea1j6aQGuW9W-wF6r-Zdk",
  authDomain:        "pluo-compact-cef5og.firebaseapp.com",
  projectId:         "pluo-compact-cef5og",
  storageBucket:     "pluo-compact-cef5og.firebasestorage.app",
  messagingSenderId: "443227636027",
  appId:             "1:443227636027:web:c8459adcd92cec1d23f71e"
};

/* ---------- CONFIG MQTT (HiveMQ) ---------- */
const MQTT_HOST = "e0b71edcce184b74a7a5a87fc9d2b605.s1.eu.hivemq.cloud";
const MQTT_PORT = 8884;
const MQTT_USER = "pluo_firmware";
const MQTT_PASS = "Pluo2012";

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

/* ---------- ESTADO GLOBAL ---------- */
let mqttClient   = null;
let unidadActual = null;  // { device_id, nombre, token_observador }
let estadoActual = {};    // último EST: parseado
let intervalPoll = null;
let sectorManualSel = 1;
let progActual   = 1;
let programas    = {};    // { 1: {...}, 2: {...}, ... }
let salidas      = {};    // { "1": {...}, "12": {...} }
let tabActual    = 'control';

/* ---------- DOM ---------- */
const pLogin     = document.getElementById('pantalla-login');
const pApp       = document.getElementById('pantalla-app');
const appBody    = document.getElementById('appBody');
const headerTit  = document.getElementById('headerTitulo');
const btnBack    = document.getElementById('btnBack');
const btnLogout  = document.getElementById('btnLogout');
const estadoCnx  = document.getElementById('estadoCnx');
const toastEl    = document.getElementById('toast');

/* ---------- TOAST ---------- */
function toast(msg, dur = 2500) {
  toastEl.textContent = msg;
  toastEl.classList.add('visible');
  setTimeout(() => toastEl.classList.remove('visible'), dur);
}

/* ---------- PANTALLAS ---------- */
function mostrarLogin() {
  pLogin.classList.add('activa');
  pApp.classList.remove('activa');
  headerTit.textContent = 'CTRL12';
  btnBack.classList.remove('visible');
}
function mostrarApp() {
  pLogin.classList.remove('activa');
  pApp.classList.add('activa');
}

/* ---------- AUTH ---------- */
document.getElementById('estadoCnx').textContent = 'firebase: ok';

onAuthStateChanged(auth, async user => {
  if (user) {
    mostrarApp();
    await cargarUnidades(user);
  } else {
    mostrarLogin();
  }
});

document.getElementById('formLogin').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('btnLogin');
  const msg = document.getElementById('msgError');
  msg.classList.remove('visible');
  btn.disabled = true; btn.textContent = 'Entrando…';
  try {
    await signInWithEmailAndPassword(auth,
      document.getElementById('email').value.trim(),
      document.getElementById('password').value);
  } catch (err) {
    msg.textContent = 'Correo o contraseña incorrectos.';
    msg.classList.add('visible');
  } finally { btn.disabled = false; btn.textContent = 'Entrar'; }
});

btnLogout.addEventListener('click', async () => {
  desconectarMQTT();
  await signOut(auth);
});

btnBack.addEventListener('click', () => {
  desconectarMQTT();
  unidadActual = null;
  btnBack.classList.remove('visible');
  headerTit.textContent = 'CTRL12';
  cargarUnidades(auth.currentUser);
});

/* ---------- LISTA DE UNIDADES ---------- */
async function cargarUnidades(user) {
  appBody.innerHTML = '<div class="spinner">Cargando unidades…</div>';
  mostrarApp();
  btnBack.classList.remove('visible');
  headerTit.textContent = 'CTRL12';

  // Obtener cliente_ref desde Users/{uid}
  const userSnap = await getDoc(doc(db, 'Users', user.uid));
  if (!userSnap.exists()) {
    appBody.innerHTML = '<p class="txt-tenue">Sin acceso.</p>'; return;
  }
  const clienteRef = userSnap.data().cliente_ref;

  // Buscar unidades con tipo ctrl12 vinculadas a este cliente
  const uSnap = await getDocs(collection(db, 'Unidades'));
  const unidades = [];
  uSnap.forEach(d => {
    const data = d.data();
    if (data.tipo === 'ctrl12' && data.cliente_ref && data.cliente_ref.path === clienteRef.path) {
      unidades.push({ id: d.id, ...data });
    }
  });

  if (unidades.length === 0) {
    appBody.innerHTML = '<p class="txt-tenue" style="text-align:center;padding:40px 0">No hay unidades asignadas.</p>';
    return;
  }

  appBody.innerHTML = `
    <div class="seccion-titulo">Tus equipos (${unidades.length})</div>
    ${unidades.map(u => `
      <div class="unidad-card" data-id="${u.id}" data-nombre="${u.nombre||u.id}" data-token="${u.token_observador||''}">
        <div class="unidad-icono">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <div class="unidad-info">
          <div class="unidad-nombre">${u.nombre || 'Sin nombre'}</div>
          <div class="unidad-id">${u.id}</div>
        </div>
        <div class="dot-estado" id="dot-${u.id}"></div>
      </div>
    `).join('')}
  `;

  document.querySelectorAll('.unidad-card').forEach(card => {
    card.addEventListener('click', () => {
      abrirUnidad(card.dataset.id, card.dataset.nombre, card.dataset.token);
    });
  });
}

/* ---------- ABRIR UNIDAD ---------- */
async function abrirUnidad(deviceId, nombre, tokenObs) {
  unidadActual = { device_id: deviceId, nombre, token_observador: tokenObs };
  headerTit.textContent = nombre || deviceId;
  btnBack.classList.add('visible');

  // Cargar salidas y programas de Firestore
  await cargarSalidas(deviceId);
  await cargarProgramas(deviceId);

  // Conectar MQTT
  conectarMQTT(deviceId, tokenObs);

  // Mostrar UI
  renderDetalle();
}

/* ---------- FIRESTORE DATA ---------- */
async function cargarSalidas(deviceId) {
  salidas = {};
  const snap = await getDocs(collection(db, 'Unidades', deviceId, 'Salidas'));
  snap.forEach(d => { salidas[d.id] = d.data(); });
}

async function cargarProgramas(deviceId) {
  programas = {};
  const snap = await getDocs(collection(db, 'Unidades', deviceId, 'Programas'));
  snap.forEach(d => { programas[d.id] = d.data(); });
  // Asegurar que los 5 programas existen
  for (let p = 1; p <= 5; p++) {
    if (!programas[String(p)]) {
      programas[String(p)] = {
        activo: false, hora_inicio: '00:00',
        dias: [false,false,false,false,false,false,false],
        sectores: {}
      };
      for (let s = 1; s <= 12; s++) {
        programas[String(p)].sectores[String(s)] = { habilitado: false, horas: 0, minutos: 0 };
      }
    }
  }
}

async function guardarPrograma(progNum) {
  const cfg = programas[String(progNum)];
  await setDoc(doc(db, 'Unidades', unidadActual.device_id, 'Programas', String(progNum)), cfg);
}

async function guardarSalida(num, data) {
  await setDoc(doc(db, 'Unidades', unidadActual.device_id, 'Salidas', String(num)), data, { merge: true });
}

/* ---------- MQTT ---------- */
function conectarMQTT(deviceId, tokenObs) {
  desconectarMQTT();
  const clientId = 'ctrl12web_' + Math.random().toString(16).slice(2, 8);
  try {
    mqttClient = mqtt.connect(`wss://${MQTT_HOST}:${MQTT_PORT}/mqtt`, {
      clientId, username: MQTT_USER, password: MQTT_PASS,
      clean: true, reconnectPeriod: 3000
    });

    mqttClient.on('connect', () => {
      mqttClient.subscribe(`ctrl12/${deviceId}/resp`);
      // Poll inicial
      enviarCmd('GETESTADO');
      intervalPoll = setInterval(() => enviarCmd('GETESTADO'), 3000);
    });

    mqttClient.on('message', (topic, payload) => {
      procesarRespuesta(payload.toString());
    });

    mqttClient.on('error', err => console.warn('MQTT error:', err));
  } catch(e) { console.warn('MQTT no disponible:', e); }
}

function desconectarMQTT() {
  clearInterval(intervalPoll);
  intervalPoll = null;
  if (mqttClient) { mqttClient.end(true); mqttClient = null; }
}

function enviarCmd(cmd) {
  if (!mqttClient || !mqttClient.connected || !unidadActual) return;
  const token = unidadActual.token_observador || 'OBS-CTRL-7f21';
  mqttClient.publish(`ctrl12/${unidadActual.device_id}/cmd`, `${token}:${cmd}`);
}

function enviarCmdOp(cmd) {
  // Para comandos de operador — el token_observador no tiene permisos
  // Usar token_operador (hardcoded por ahora, mejorar con Firestore)
  if (!mqttClient || !mqttClient.connected || !unidadActual) return;
  mqttClient.publish(`ctrl12/${unidadActual.device_id}/cmd`, `OP-CTRL-4m9q:${cmd}`);
}

function procesarRespuesta(msg) {
  if (msg.startsWith('EST:')) {
    const p = msg.split(':');
    estadoActual = {
      sector:    parseInt(p[1]) || 0,
      programa:  parseInt(p[2]) || 0,
      m3:        parseFloat(p[3]) || 0,
      estado:    parseInt(p[4]) || 0,
      elapsed:   parseInt(p[5]) || 0,
      horas_cfg: parseInt(p[6]) || 0,
      min_cfg:   parseInt(p[7]) || 0,
      pausa:     p[8] === '1',
      modo:      parseInt(p[9]) || 0,
      durTotal:  parseInt(p[10]) || 0,
      placa2:    p[11] || 'TIMEOUT'
    };
    actualizarEstado();
  }
}

/* ---------- RENDER DETALLE ---------- */
function renderDetalle() {
  appBody.innerHTML = `
    <div class="tabs">
      <button class="tab ${tabActual==='control'?'activo':''}" onclick="cambiarTab('control')">Control</button>
      <button class="tab ${tabActual==='programas'?'activo':''}" onclick="cambiarTab('programas')">Programas</button>
    </div>
    <div id="contenido-tab"></div>
  `;
  renderTab();
}

window.cambiarTab = function(tab) {
  tabActual = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('activo'));
  document.querySelectorAll('.tab').forEach(t => {
    if (t.textContent.toLowerCase().startsWith(tab.substring(0,4))) t.classList.add('activo');
  });
  renderTab();
};

function renderTab() {
  const ct = document.getElementById('contenido-tab');
  if (!ct) return;
  if (tabActual === 'control')   ct.innerHTML = htmlControl();
  if (tabActual === 'programas') ct.innerHTML = htmlProgramas();
  bindControl();
}

/* =====================================================
   TAB CONTROL
   ===================================================== */
function htmlControl() {
  return `
    <!-- Estado en vivo -->
    <div class="card" id="cardEstado">
      <div class="card-titulo">Estado en vivo</div>
      <div id="estadoLive"><div class="spinner">Esperando datos…</div></div>
    </div>

    <!-- Botones de control -->
    <div class="card">
      <div class="card-titulo">Control</div>
      <div class="btns-control">
        <button class="btn-ctrl" id="btnPausaReanuda" onclick="accionPausaReanuda()">Pausar</button>
        <button class="btn-ctrl" onclick="accionSaltar()">Saltar</button>
        <button class="btn-ctrl peligro" onclick="accionDetener()">Detener</button>
      </div>
    </div>

    <!-- Riego manual -->
    <div class="card">
      <div class="card-titulo">Riego manual</div>
      <div class="manual-grid" id="sectorGrid">
        ${[...Array(12)].map((_,i)=>{
          const s = i+1;
          const nombre = salidas[String(s)]?.nombre || `Sector ${s}`;
          const p2 = s > 6 ? 'placa2' : '';
          return `<button class="sector-btn ${p2} ${sectorManualSel===s?'activo':''}" onclick="selSector(${s})">${nombre}</button>`;
        }).join('')}
      </div>
      <div class="fila-minutos">
        <label>Minutos:</label>
        <input type="number" id="inputMin" min="1" max="240" value="5">
        <button class="btn-primario" style="flex:1;padding:10px" onclick="accionManual()">Iniciar</button>
      </div>
    </div>

    <!-- Historial -->
    <div class="card">
      <div class="card-titulo">Historial de riegos</div>
      <div id="historial"><div class="spinner">Cargando…</div></div>
    </div>

    <!-- Iniciar programa -->
    <div class="card">
      <div class="card-titulo">Iniciar programa ahora</div>
      <div class="prog-selector" id="progIniciarSel">
        ${[1,2,3,4,5].map(p=>`<button class="prog-btn" onclick="accionIniciarProg(${p})">Prog ${p}</button>`).join('')}
      </div>
    </div>
  `;
}

function bindControl() {
  actualizarEstado();
  // Pedir historial
  enviarCmd('GETREGISTROS');
  // Simular historial vacío por ahora
  const h = document.getElementById('historial');
  if (h) h.innerHTML = '<p class="txt-tenue" style="padding:8px 0">Sin registros aún.</p>';
}

function actualizarEstado() {
  const el = document.getElementById('estadoLive');
  if (!el || tabActual !== 'control') return;

  const e = estadoActual;
  if (!e || e.estado === undefined) return;

  const estados = ['Inactivo','Regando','Falla','Config'];
  const esRegando = e.estado === 1;
  const esPausado = e.pausa;
  const badgeCls = e.estado===0?'inactivo': e.pausa?'pausado': e.estado===1?'regando': e.estado===2?'falla':'inactivo';
  const pct = e.durTotal > 0 ? Math.min(100, Math.round(e.elapsed/e.durTotal*100)) : 0;
  const tiempoRest = e.durTotal - e.elapsed;
  const p2cls = e.placa2==='OK' ? 'ok' : '';

  el.innerHTML = `
    <div class="row" style="margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <span class="badge-estado ${badgeCls}"><span class="dot"></span>${e.pausa?'Pausado':estados[e.estado]||'?'}</span>
      <span class="placa2-badge ${p2cls}">Placa 2: ${e.placa2||'?'}</span>
    </div>
    ${esRegando ? `
      <div class="estado-grid">
        <div class="estado-item">
          <div class="estado-label">Sector activo</div>
          <div class="estado-valor grande">${e.sector > 0 ? (salidas[String(e.sector)]?.nombre||`S${e.sector}`) : '—'}</div>
        </div>
        <div class="estado-item">
          <div class="estado-label">Programa</div>
          <div class="estado-valor">${e.programa > 0 ? `Prog ${e.programa}` : 'Manual'}</div>
        </div>
        <div class="estado-item">
          <div class="estado-label">Transcurrido</div>
          <div class="estado-valor">${fmtSeg(e.elapsed)}</div>
        </div>
        <div class="estado-item">
          <div class="estado-label">Restante</div>
          <div class="estado-valor ${tiempoRest<60?'alerta':''}">${fmtSeg(Math.max(0,tiempoRest))}</div>
        </div>
      </div>
      <div class="barra-tiempo"><div class="barra-tiempo-fill" style="width:${pct}%"></div></div>
    ` : `<p class="txt-tenue" style="text-align:center;padding:8px 0">Sin riego activo.</p>`}
  `;

  // Actualizar botón pausa/reanuda
  const btn = document.getElementById('btnPausaReanuda');
  if (btn) btn.textContent = e.pausa ? 'Reanudar' : 'Pausar';
}

window.selSector = function(s) {
  sectorManualSel = s;
  document.querySelectorAll('.sector-btn').forEach((b,i) => {
    b.classList.toggle('activo', i+1 === s);
  });
};

window.accionManual      = function() { const m = parseInt(document.getElementById('inputMin')?.value)||5; enviarCmdOp(`MANUAL:${sectorManualSel},${m}`); toast(`Iniciando sector ${sectorManualSel} por ${m} min`); };
window.accionDetener     = function() { enviarCmdOp('DETENER'); toast('Deteniendo riego…'); };
window.accionSaltar      = function() { enviarCmdOp('SALTAR'); toast('Saltando al siguiente sector…'); };
window.accionPausaReanuda= function() { const cmd = estadoActual.pausa ? 'REANUDAR' : 'PAUSAR'; enviarCmdOp(cmd); toast(estadoActual.pausa?'Reanudando…':'Pausando…'); };
window.accionIniciarProg = function(p) { enviarCmdOp(`INICIAR:${p}`); toast(`Iniciando programa ${p}…`); };

function fmtSeg(s) {
  const m = Math.floor(s/60); const ss = s%60;
  return `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
}

/* =====================================================
   TAB PROGRAMAS
   ===================================================== */
const DIAS = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

function htmlProgramas() {
  const prog = programas[String(progActual)] || {};
  const dias = prog.dias || [false,false,false,false,false,false,false];
  const sectores = prog.sectores || {};
  const hora = prog.hora_inicio || '00:00';

  return `
    <div class="card">
      <div class="card-titulo">Seleccionar programa</div>
      <div class="prog-selector">
        ${[1,2,3,4,5].map(p=>`
          <button class="prog-btn ${p===progActual?'activo':''}" onclick="selProg(${p})">Prog ${p}</button>
        `).join('')}
      </div>
    </div>

    <div class="card">
      <div class="card-titulo">Configuración — Programa ${progActual}</div>

      <div class="switch-row">
        <span class="switch-label">Activo</span>
        <label class="switch">
          <input type="checkbox" id="chkActivo" ${prog.activo?'checked':''}>
          <div class="switch-track"></div>
          <div class="switch-thumb"></div>
        </label>
      </div>

      <div class="campo-hora">
        <label>Hora de inicio</label>
        <input type="text" id="inputHora" value="${hora}" placeholder="HH:MM" maxlength="5">
      </div>

      <div class="dias-wrap" id="diasWrap">
        ${DIAS.map((d,i)=>`
          <div class="dia-chip ${dias[i]?'sel':''}" data-idx="${i}" onclick="toggleDia(this)">${d}</div>
        `).join('')}
      </div>

      <div class="seccion-titulo" style="margin-top:14px">Sectores (horas / minutos)</div>
      <div class="sectores-lista">
        ${[...Array(12)].map((_,i)=>{
          const s = i+1;
          const sc = sectores[String(s)] || { habilitado:false, horas:0, minutos:0 };
          const nombre = salidas[String(s)]?.nombre || `Sector ${s}`;
          const p2 = s > 6 ? '(P2)' : '';
          return `
            <div class="sector-row">
              <div>
                <label class="switch" style="width:36px;height:20px">
                  <input type="checkbox" class="chk-sector" data-s="${s}" ${sc.habilitado?'checked':''}
                    onchange="toggleSector(${s},this.checked)">
                  <div class="switch-track"></div>
                  <div class="switch-thumb" style="top:2px;left:2px;width:16px;height:16px"></div>
                </label>
              </div>
              <div class="sector-nombre">${nombre}<span>${p2}</span></div>
              <div class="salida-campo">
                <input type="number" class="dur-input" min="0" max="23" value="${sc.horas}"
                  data-s="${s}" data-t="horas" ${sc.habilitado?'':'disabled'}
                  style="width:100%;margin-bottom:3px">
                <div class="dur-label">horas</div>
              </div>
              <div class="salida-campo">
                <input type="number" class="dur-input" min="0" max="59" value="${sc.minutos}"
                  data-s="${s}" data-t="minutos" ${sc.habilitado?'':'disabled'}
                  style="width:100%">
                <div class="dur-label">min</div>
              </div>
            </div>
          `;
        }).join('')}
      </div>

      <div class="btns-prog">
        <button class="btn-sec" onclick="guardarProgUI()">Guardar</button>
        <button class="btn-primario" style="flex:1;padding:13px;border-radius:12px" onclick="accionIniciarProg(${progActual})">Iniciar ahora</button>
      </div>
    </div>
  `;
}

window.selProg = function(p) {
  progActual = p;
  renderTab();
};

window.toggleDia = function(el) {
  const idx = parseInt(el.dataset.idx);
  el.classList.toggle('sel');
  const prog = programas[String(progActual)];
  if (!prog.dias) prog.dias = [false,false,false,false,false,false,false];
  prog.dias[idx] = el.classList.contains('sel');
};

window.toggleSector = function(s, checked) {
  const prog = programas[String(progActual)];
  if (!prog.sectores[String(s)]) prog.sectores[String(s)] = { habilitado:false, horas:0, minutos:0 };
  prog.sectores[String(s)].habilitado = checked;
  // Habilitar/deshabilitar inputs
  document.querySelectorAll(`.dur-input[data-s="${s}"]`).forEach(inp => inp.disabled = !checked);
};

window.guardarProgUI = async function() {
  const prog = programas[String(progActual)];
  prog.activo = document.getElementById('chkActivo')?.checked || false;
  prog.hora_inicio = document.getElementById('inputHora')?.value || '00:00';

  // Leer duraciones
  document.querySelectorAll('.dur-input').forEach(inp => {
    const s = inp.dataset.s; const t = inp.dataset.t;
    if (!prog.sectores[s]) prog.sectores[s] = { habilitado:false, horas:0, minutos:0 };
    prog.sectores[s][t] = parseInt(inp.value) || 0;
  });

  // Guardar en Firestore
  await guardarPrograma(progActual);

  // Enviar por MQTT (todos los 12 sectores)
  const h = prog.hora_inicio.split(':');
  enviarCmdOp(`SETPROG:${progActual},${prog.activo?1:0},0,${h[0]||0},${h[1]||0}`);
  enviarCmdOp(`SETDIAS:${progActual},${prog.dias.map(d=>d?1:0).join(',')}`);
  for (let s = 1; s <= 12; s++) {
    const sc = prog.sectores[String(s)] || { habilitado:false, horas:0, minutos:0 };
    enviarCmdOp(`SETSECTOR:${progActual},${s},${sc.habilitado?1:0},${sc.horas},${sc.minutos}`);
  }

  toast(`Programa ${progActual} guardado ✓`);
};

</script>
