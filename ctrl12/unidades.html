<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Diagnóstico CTRL12</title>
<style>
  body { font-family: monospace; padding: 20px; background: #f5f5f5; }
  pre { background: #fff; padding: 15px; border-radius: 8px; overflow-x: auto; border: 1px solid #ddd; }
  .error { color: red; }
  .ok { color: green; }
</style>
</head>
<body>
<h1>Diagnóstico Firebase</h1>
<div id="output"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBSIO3eWIlMTtea1j6aQGuW9W-wF6r-Zdk",
    authDomain: "pluo-compact-cef5og.firebaseapp.com",
    projectId: "pluo-compact-cef5og",
    storageBucket: "pluo-compact-cef5og.firebasestorage.app",
    messagingSenderId: "443227636027",
    appId: "1:443227636027:web:c8459adcd92cec1d23f71e"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const output = document.getElementById('output');

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      output.innerHTML = '<p class="error">No autenticado</p>';
      return;
    }

    try {
      let html = `<p><strong>UID:</strong> ${user.uid}</p>`;

      // 1. Leer Users/{uid}
      const userDoc = await getDoc(doc(db, 'Users', user.uid));
      if (!userDoc.exists()) {
        html += '<p class="error">❌ Usuario NO existe en Users/{uid}</p>';
      } else {
        const userData = userDoc.data();
        html += `<p class="ok">✓ Usuario encontrado</p>`;
        html += `<pre>${JSON.stringify(userData, null, 2)}</pre>`;
        html += `<p><strong>cliente_ref valor:</strong> "${userData.cliente_ref}"</p>`;
        html += `<p><strong>cliente_ref tipo:</strong> ${typeof userData.cliente_ref}</p>`;
      }

      // 2. Leer Unidades/CE000001
      const unitDoc = await getDoc(doc(db, 'Unidades', 'CE000001'));
      if (!unitDoc.exists()) {
        html += '<p class="error">❌ CE000001 NO existe en Unidades</p>';
      } else {
        const unitData = unitDoc.data();
        html += `<p class="ok">✓ Unidad CE000001 encontrada</p>`;
        html += `<pre>${JSON.stringify(unitData, null, 2)}</pre>`;
        html += `<p><strong>tipo:</strong> "${unitData.tipo}"</p>`;
        html += `<p><strong>cliente_ref valor:</strong> "${unitData.cliente_ref}"</p>`;
        html += `<p><strong>cliente_ref tipo:</strong> ${typeof unitData.cliente_ref}</p>`;

        // Comparación
        const userRef = userData.cliente_ref;
        const unitRef = unitData.cliente_ref;
        const coincide = userRef === unitRef;
        html += `<p><strong>¿Coinciden?</strong> <span class="${coincide ? 'ok' : 'error'}">${coincide ? '✓ SÍ' : '❌ NO'}</span></p>`;
      }

      output.innerHTML = html;
    } catch (err) {
      output.innerHTML = `<p class="error">Error: ${err.message}</p>`;
    }
  });
</script>

</body>
</html>
