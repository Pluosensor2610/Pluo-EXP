<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Diagnóstico CTRL12</title>
<style>
  body { font-family: monospace; padding: 20px; background: #f5f5f5; }
  pre { background: #fff; padding: 15px; border-radius: 8px; overflow-x: auto; border: 1px solid #ddd; max-height: 400px; }
  .error { color: red; font-weight: bold; }
  .ok { color: green; font-weight: bold; }
  h2 { margin-top: 20px; }
</style>
</head>
<body>
<h1>Diagnóstico Firebase — CTRL12</h1>
<div id="output"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBSIO3eWIlMTtea1j6aQGuW9W-wF6r-Zdk",
    authDomain: "pluo-compact-cef5og.firebaseapp.com",
    projectId: "pluo-compact-cef5og",
    storageBucket: "pluo-compact-cef5og.firebasestorage.app",
    messagingSenderId: "443227636027",
    appId: "1:443227636027:web:c8459adcd92cec1d23f71e"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const output = document.getElementById('output');

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      output.innerHTML = '<p class="error">❌ No autenticado</p>';
      return;
    }

    try {
      let html = `<h2>Usuario Logueado</h2>`;
      html += `<p><strong>UID:</strong> ${user.uid}</p>`;
      html += `<p><strong>Email:</strong> ${user.email}</p>`;

      // 1. Leer Users/{uid}
      html += `<h2>1. Verificando Users/${user.uid}</h2>`;
      const userDoc = await getDoc(doc(db, 'Users', user.uid));
      
      let userData = null;
      if (!userDoc.exists()) {
        html += '<p class="error">❌ Documento NO existe en Users/{uid}</p>';
      } else {
        userData = userDoc.data();
        html += `<p class="ok">✓ Documento encontrado</p>`;
        html += `<h3>Contenido:</h3>`;
        html += `<pre>${JSON.stringify(userData, null, 2)}</pre>`;
        if (userData.cliente_ref) {
          html += `<p><strong>cliente_ref valor:</strong> <code>"${userData.cliente_ref}"</code></p>`;
          html += `<p><strong>cliente_ref tipo:</strong> <code>${typeof userData.cliente_ref}</code></p>`;
        } else {
          html += `<p class="error">❌ cliente_ref NO definido en Users/{uid}</p>`;
        }
      }

      // 2. Leer Unidades/CE000001
      html += `<h2>2. Verificando Unidades/CE000001</h2>`;
      const unitDoc = await getDoc(doc(db, 'Unidades', 'CE000001'));
      
      if (!unitDoc.exists()) {
        html += '<p class="error">❌ CE000001 NO existe en Unidades</p>';
      } else {
        const unitData = unitDoc.data();
        html += `<p class="ok">✓ Documento encontrado</p>`;
        html += `<h3>Contenido:</h3>`;
        html += `<pre>${JSON.stringify(unitData, null, 2)}</pre>`;
        html += `<p><strong>tipo:</strong> <code>"${unitData.tipo}"</code></p>`;
        if (unitData.cliente_ref) {
          html += `<p><strong>cliente_ref valor:</strong> <code>"${unitData.cliente_ref}"</code></p>`;
          html += `<p><strong>cliente_ref tipo:</strong> <code>${typeof unitData.cliente_ref}</code></p>`;
        } else {
          html += `<p class="error">❌ cliente_ref NO definido en Unidades/CE000001</p>`;
        }

        // 3. Comparación
        if (userData && userData.cliente_ref && unitData.cliente_ref) {
          html += `<h2>3. Comparación</h2>`;
          const coincide = userData.cliente_ref === unitData.cliente_ref;
          html += `<p><strong>¿cliente_ref coinciden?</strong> <span class="${coincide ? 'ok' : 'error'}">${coincide ? '✓ SÍ' : '❌ NO'}</span></p>`;
          if (!coincide) {
            html += `<p class="error">Users: <code>${userData.cliente_ref}</code></p>`;
            html += `<p class="error">Unidades: <code>${unitData.cliente_ref}</code></p>`;
          }
        }
      }

      output.innerHTML = html;
    } catch (err) {
      output.innerHTML = `<p class="error">Error: ${err.message}</p><pre>${err.stack}</pre>`;
    }
  });
</script>

</body>
</html>
