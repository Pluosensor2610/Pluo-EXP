<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ctrl12 — Acceso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --azul: #1976D2;
    --azul-claro: #E8F4FB;
    --teal: #00897B;
    --texto: #1A2B33;
    --texto-tenue: #6B7C85;
    --blanco: #FFFFFF;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--azul);
    font-family: 'Manrope', sans-serif;
    color: var(--texto);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .tarjeta {
    width: 100%;
    max-width: 400px;
    min-height: 100vh;
    background: var(--blanco);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 32px 28px;
  }

  @media (min-width: 460px) {
    .tarjeta {
      min-height: auto;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      margin: 24px;
      padding: 44px 36px;
    }
  }

  .logo-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
  }

  .logo-circulo {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: var(--teal);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.05em;
  }

  h1 {
    font-size: 22px;
    font-weight: 800;
    text-align: center;
    margin: 0 0 4px 0;
    color: var(--texto);
  }

  .subtitulo {
    text-align: center;
    color: var(--texto-tenue);
    font-size: 14px;
    margin: 0 0 32px 0;
  }

  label {
    display: block;
    font-size: 13px;
    color: var(--texto-tenue);
    margin-bottom: 6px;
    font-weight: 600;
  }

  .campo { margin-bottom: 18px; }

  input {
    width: 100%;
    padding: 13px 14px;
    background: #EEF2F6;
    border: 2px solid transparent;
    border-radius: 10px;
    color: var(--texto);
    font-family: 'Manrope', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus { border-color: var(--teal); background: #fff; }

  button {
    width: 100%;
    padding: 14px;
    background: var(--teal);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    margin-top: 6px;
    font-family: 'Manrope', sans-serif;
  }

  button:active { opacity: 0.85; }
  button:disabled { opacity: 0.5; }

  .mensaje {
    margin-top: 14px;
    padding: 11px 13px;
    border-radius: 8px;
    font-size: 13px;
    display: none;
  }

  .mensaje.error {
    display: block;
    background: rgba(198,40,40,0.10);
    border: 1px solid rgba(198,40,40,0.30);
    color: #B71C1C;
  }

  .estado-conexion {
    text-align: center;
    margin-top: 20px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--texto-tenue);
  }
</style>
</head>
<body>

<div class="tarjeta">
  <div class="logo-wrap">
    <div class="logo-circulo">CTRL12</div>
  </div>
  <h1>Mi Riego</h1>
  <p class="subtitulo">Control de riego — 12 salidas</p>

  <form id="formLogin">
    <div class="campo">
      <label for="email">Correo</label>
      <input type="email" id="email" required autocomplete="email">
    </div>
    <div class="campo">
      <label for="password">Contraseña</label>
      <input type="password" id="password" required autocomplete="current-password">
    </div>
    <button type="submit" id="btnEntrar">Entrar</button>
    <div class="mensaje" id="mensajeError"></div>
  </form>

  <div class="estado-conexion" id="estadoFirebase">conectando…</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import {
    getAuth,
    signInWithEmailAndPassword,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyBSIO3eWIlMTtea1j6aQGuW9W-wF6r-Zdk",
    authDomain:        "pluo-compact-cef5og.firebaseapp.com",
    projectId:         "pluo-compact-cef5og",
    storageBucket:     "pluo-compact-cef5og.firebasestorage.app",
    messagingSenderId: "443227636027",
    appId:             "1:443227636027:web:c8459adcd92cec1d23f71e"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const estadoFirebase = document.getElementById('estadoFirebase');
  const form           = document.getElementById('formLogin');
  const btnEntrar      = document.getElementById('btnEntrar');
  const mensajeError   = document.getElementById('mensajeError');

  estadoFirebase.textContent = 'firebase: ok';

  onAuthStateChanged(auth, (user) => {
    if (user) {
      window.location.href = 'unidades.html';
    }
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    mensajeError.className = 'mensaje';
    mensajeError.textContent = '';
    btnEntrar.disabled = true;
    btnEntrar.textContent = 'Entrando…';

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch (err) {
      mensajeError.className = 'mensaje error';
      mensajeError.textContent = 'No se pudo iniciar sesión. Verifica correo y contraseña.';
      console.error(err.code, err.message);
    } finally {
      btnEntrar.disabled = false;
      btnEntrar.textContent = 'Entrar';
    }
  });
</script>

</body>
</html>
