<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ctrl12 — Equipo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --azul:       #1976D2;
    --teal:       #00897B;
    --teal-light: #E0F2F1;
    --verde-ws:   #25D366;
    --gris:       #B9C2C6;
    --naranja:    #E65100;
    --amarillo:   #FBBC04;
    --alerta:     #E24C4C;
    --texto:      #1A2B33;
    --texto-tenue:#6B7C85;
    --blanco:     #FFFFFF;
    --fondo:      #F4F7F9;
  }

  @keyframes parpadeoRojo {
    0%, 100% { background: var(--verde-ws); color: #fff; }
    50% { background: var(--alerta); color: #fff; }
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; min-height: 100vh; background: var(--fondo); font-family: 'Manrope', sans-serif; color: var(--texto); }
  button { cursor: pointer; font-family: 'Manrope', sans-serif; }

  header {
    background: var(--azul); color: var(--blanco);
    padding: 16px 20px; display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 10;
  }
  #btnVolver {
    background: rgba(255,255,255,0.15); border: none; color: var(--blanco);
    width: 34px; height: 34px; border-radius: 8px; font-size: 18px; flex-shrink: 0;
  }
  header .titulos { flex: 1; min-width: 0; }
  header h1 { font-size: 16px; margin: 0; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  header p  { font-size: 11px; margin: 0; opacity: 0.85; font-family: 'IBM Plex Mono', monospace; }
  
  .conexion-badge {
    padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700;
    color: #fff; font-family: 'IBM Plex Mono', monospace;
  }
  .conexion-badge.online { background: var(--verde-ws); }
  .conexion-badge.offline { background: var(--alerta); }

  main { max-width: 480px; margin: 0 auto; padding: 16px; }

  .nav-tabs {
    display: flex; background: var(--blanco); border-bottom: 1px solid #E0E0E0;
    position: sticky; top: 68px; z-index: 9; overflow-x: auto;
  }
  .tab-nav-btn {
    flex: 1; padding: 12px 8px; border: none; background: none;
    color: var(--texto-tenue); font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.03em; white-space: nowrap;
    border-bottom: 3px solid transparent;
  }
  .tab-nav-btn.activo { color: var(--azul); border-bottom-color: var(--azul); }

  .tab-content { display: none; }
  .tab-content.activo { display: block; }

  /* SECTORES */
  .grid-sectores { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

  .tarjeta-sector {
    background: var(--blanco); border-radius: 12px;
    padding: 12px 6px; text-align: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    position: relative;
  }
  .badge-p2 {
    position: absolute; top: 5px; right: 5px;
    font-size: 8px; font-weight: 700; color: var(--naranja);
    font-family: 'IBM Plex Mono', monospace;
  }
  .tarjeta-sector .nombre {
    font-size: 11px; font-weight: 700; margin-bottom: 8px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .circulo-wrap {
    position: relative; width: 64px; height: 64px; margin: 0 auto 8px auto;
  }
  .anillo-svg {
    position: absolute; top: 0; left: 0; width: 64px; height: 64px;
    transform: rotate(-90deg);
  }
  .anillo-track { fill: none; stroke: #E8ECEE; stroke-width: 6; }
  .anillo-fill {
    fill: none; stroke: var(--verde-ws); stroke-width: 6; stroke-linecap: round;
    stroke-dasharray: 169.6; stroke-dashoffset: 169.6;
    transition: stroke-dashoffset 1s linear;
  }
  .circulo-icono {
    position: absolute; top: 14px; left: 14px;
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--azul);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s ease;
  }
  .circulo-icono svg { width: 20px; height: 20px; }
  .tarjeta-sector .estado-texto { font-size: 10px; color: var(--texto-tenue); }

  /* TARJETA ESTADO */
  .tarjeta-card {
    background: var(--blanco); border-radius: 12px;
    padding: 16px; margin-top: 16px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
  }
  .tarjeta-card h2 {
    font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em;
    color: #fff; margin: 0 0 12px 0;
    background: var(--verde-ws); padding: 8px 12px; border-radius: 8px;
    transition: background 0.3s ease;
  }
  .tarjeta-card h2.parpadeo {
    animation: parpadeoRojo 1s infinite;
  }
  .fila-estado { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; border-bottom: 1px solid #F0F0F0; }
  .fila-estado:last-child { border-bottom: none; }
  .fila-estado span:first-child { color: var(--texto-tenue); }
  .fila-estado span:last-child  { color: var(--texto); font-weight: 600; }
  .barra-progreso { height: 6px; background: #E0E0E0; border-radius: 3px; margin-top: 10px; overflow: hidden; }
  .barra-fill { height: 100%; background: var(--azul); border-radius: 3px; transition: width 1s linear; }

  /* BOTONES CONTROL FIJOS */
  .botones-fijos { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
  .btn-ctrl {
    padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 700;
    border: 1px solid var(--gris); background: var(--blanco); color: var(--texto);
  }
  .btn-ctrl.primario { background: var(--azul); color: #fff; border-color: var(--azul); }
  .btn-ctrl.peligro { background: var(--alerta); color: #fff; border-color: var(--alerta); }
  .btn-ctrl:disabled { opacity: 0.4; }

  /* RIEGO MANUAL */
  .manual-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
  .btn-sector-manual {
    padding: 8px 4px; border-radius: 8px; font-size: 11px; font-weight: 700;
    border: 1px solid var(--gris); background: var(--blanco); color: var(--texto); text-align: center;
  }
  .btn-sector-manual.p2 { border-style: dashed; display: none; }
  .btn-sector-manual.sel { background: var(--azul); color: #fff; border-color: var(--azul); }
  .fila-manual { display: flex; align-items: center; gap: 8px; }
  .fila-manual label { font-size: 13px; font-weight: 600; color: var(--texto-tenue); white-space: nowrap; }
  .input-min {
    width: 70px; padding: 8px; text-align: center;
    border: 1px solid var(--gris); border-radius: 8px;
    font-size: 15px; font-weight: 700; outline: none; background: var(--fondo);
  }
  .input-min:focus { border-color: var(--azul); }

  /* SECCION DESPLEGABLE */
  .seccion {
    background: var(--blanco); border-radius: 12px;
    margin-top: 16px; box-shadow: 0 2px 6px rgba(0,0,0,0.06); overflow: hidden;
  }
  .seccion .cabecera {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; cursor: pointer; user-select: none;
  }
  .seccion .cabecera h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--texto-tenue); margin: 0; }
  .seccion .flecha { color: var(--texto-tenue); font-size: 14px; transition: transform 0.2s; }
  .seccion.abierta .flecha { transform: rotate(180deg); }
  .seccion .cuerpo { display: none; padding: 0 16px 16px; }
  .seccion.abierta .cuerpo { display: block; }

  /* PROGRAMAS */
  .tabs-prog { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .tab-prog {
    padding: 6px 12px; border: 1px solid var(--gris); border-radius: 20px;
    font-size: 12px; font-weight: 700; background: var(--blanco); color: var(--texto-tenue);
  }
  .tab-prog.activo { border-color: var(--azul); color: var(--azul); background: rgba(25,118,210,0.1); }

  .switch-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #F0F0F0; }
  .switch-label { font-size: 13px; font-weight: 600; }
  .switch { position: relative; width: 40px; height: 22px; cursor: pointer; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch-track { position: absolute; inset: 0; border-radius: 11px; background: #CCC; transition: background 0.2s; }
  .switch input:checked + .switch-track { background: var(--azul); }
  .switch-thumb { position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; border-radius: 50%; background: #fff; transition: transform 0.2s; }
  .switch input:checked ~ .switch-thumb { transform: translateX(18px); }

  .campo-hora { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #F0F0F0; }
  .campo-hora label { font-size: 13px; font-weight: 600; }
  .campo-hora input { width: 90px; padding: 7px; text-align: center; border: 1px solid var(--gris); border-radius: 8px; font-size: 14px; font-weight: 700; outline: none; }
  .campo-hora input:focus { border-color: var(--azul); }

  .dias-wrap { display: flex; gap: 5px; padding: 8px 0; flex-wrap: wrap; border-bottom: 1px solid #F0F0F0; }
  .dia-chip { padding: 5px 9px; border: 1px solid var(--gris); border-radius: 20px; font-size: 11px; font-weight: 700; color: var(--texto-tenue); cursor: pointer; user-select: none; }
  .dia-chip.sel { border-color: var(--azul); color: var(--azul); background: rgba(25,118,210,0.1); }

  .sector-row { display: grid; grid-template-columns: 28px 1fr 26px 56px 56px; align-items: center; gap: 8px; padding: 8px 0 4px; }
  .sector-row-header {
    display: grid; grid-template-columns: 28px 1fr 26px 56px 56px; gap: 8px;
    font-size: 9px; font-weight: 700; color: var(--texto-tenue); text-transform: uppercase;
    text-align: center; padding-bottom: 2px;
  }
  .sector-row-header span:nth-child(2) { text-align: left; }
  .fert-switch { justify-self: center; }
  /* Los switches chicos (28px sector-habilitado, 26px fert-switch) usan un
     thumb mas chico tambien -- el translateX(18px) del switch base (40px)
     los hacia sobresalir del track al activarse. */
  .switch-sm input:checked ~ .switch-thumb,
  .fert-switch input:checked ~ .switch-thumb {
    transform: translateX(10px);
  }
  .sector-fert-row { padding: 0 0 10px 36px; border-bottom: 1px solid #F0F0F0; }
  .sector-fert-row:last-child { border-bottom: none; }
  .fert-toggle-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .fert-toggle-row span { font-size: 11px; font-weight: 600; color: var(--texto-tenue); }
  .fert-tipo-sel {
    padding: 4px 6px; border: 1px solid var(--gris); border-radius: 6px;
    font-size: 11px; font-weight: 600; outline: none; background: var(--blanco); color: var(--texto);
  }
  .fert-tipo-sel:disabled { opacity: 0.35; background: #F5F5F5; }
  .sector-nombre { font-size: 12px; font-weight: 600; }
  .dur-inp { width: 100%; padding: 6px; text-align: center; border: 1px solid var(--gris); border-radius: 6px; font-size: 13px; font-weight: 700; outline: none; }
  .dur-inp:focus { border-color: var(--azul); }
  .dur-inp:disabled { opacity: 0.35; background: #F5F5F5; }

  .fert-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; padding: 8px 0; border-bottom: 1px solid #F0F0F0; align-items: center; }
  .fert-label { font-size: 11px; font-weight: 600; color: var(--texto-tenue); }
  .fert-inp { width: 100%; padding: 6px; text-align: center; border: 1px solid var(--gris); border-radius: 6px; font-size: 12px; font-weight: 700; outline: none; }
  .fert-inp:focus { border-color: var(--azul); }
  .fert-inp:disabled { opacity: 0.35; background: #F5F5F5; }

  .btns-prog { display: flex; gap: 8px; margin-top: 12px; }
  .btn-guardar { flex: 1; padding: 11px; background: var(--azul); color: #fff; border: none; border-radius: 8px; font-weight: 700; font-size: 13px; }
  .btn-iniciar-prog { flex: 1; padding: 11px; background: var(--azul); color: #fff; border: none; border-radius: 8px; font-weight: 700; font-size: 13px; }
  .btn-detener-prog { flex: 1; padding: 11px; background: var(--alerta); color: #fff; border: none; border-radius: 8px; font-weight: 700; font-size: 13px; }

  /* HISTORIAL */
  .fila-historial { padding: 10px 0; border-bottom: 1px solid #F0F0F0; }
  .fila-historial:last-child { border-bottom: none; }
  .fila-historial .linea1 { font-size: 13px; font-weight: 700; }
  .fila-historial .linea2 { font-size: 11px; color: var(--texto-tenue); margin-top: 2px; font-family: 'IBM Plex Mono', monospace; }

  /* SALIDAS */
  .salida-row { display: grid; grid-template-columns: 1fr 1.2fr; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #F0F0F0; }
  .salida-row:last-child { border-bottom: none; }
  .salida-nombre-inp {
    width: 100%; padding: 7px; border: 1px solid var(--gris); border-radius: 6px;
    font-size: 12px; font-weight: 600; outline: none;
  }
  .salida-nombre-inp:focus { border-color: var(--azul); }
  .salida-tipo-sel {
    width: 100%; padding: 7px; border: 1px solid var(--gris); border-radius: 6px;
    font-size: 12px; font-weight: 600; outline: none; background: var(--blanco); color: var(--texto);
  }
  .salida-tipo-sel:focus { border-color: var(--azul); }
  .caudal-row { display: grid; grid-template-columns: 1fr 150px; align-items: center; gap: 8px; padding: 8px 0; }
  .caudal-row label { font-size: 12px; font-weight: 600; color: var(--texto-tenue); }
  .caudal-inp {
    width: 100%; padding: 7px; text-align: center; border: 1px solid var(--gris); border-radius: 6px;
    font-size: 13px; font-weight: 700; outline: none;
  }
  .caudal-inp:focus { border-color: var(--azul); }

  /* TOAST */
  .toast-guardado {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--texto); color: var(--blanco); padding: 10px 18px;
    border-radius: 8px; font-size: 13px; opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease; z-index: 100;
  }
  .toast-guardado.visible { opacity: 1; }

  .msg-cargando { text-align: center; color: var(--texto-tenue); padding: 40px 20px; font-size: 14px; }
  .badge-placa2 { display: inline-block; font-size: 10px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; padding: 2px 6px; border-radius: 10px; background: rgba(230,81,0,0.12); color: var(--naranja); margin-left: 4px; }
  .badge-placa2.ok { background: rgba(37,211,102,0.12); color: var(--verde-ws); }

  .pausa-alerta { display: inline-block; background: var(--alerta); color: #fff !important; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 700; }
</style>
</head>

  /* ---------- FIRESTORE ---------- */
  async function cargarDatos() {
    const snap = await getDoc(doc(db, 'Unidades', deviceId));
    if (!snap.exists()) { window.location.href = './unidades.html'; return; }
    unidad = { id: deviceId, ...snap.data() };
    tokenObs = unidad.token_observador || 'OBS-CTRL-7f21';
    tokenOp  = 'OP-CTRL-4m9q';
    document.getElementById('nombreEquipo').textContent = unidad.nombre || deviceId;

    // Salidas
    salidas = {};
    const sSnap = await getDocs(collection(db, 'Unidades', deviceId, 'Salidas'));
    sSnap.forEach(d => { salidas[d.id] = d.data(); });
    for (let s = 1; s <= NUM_SECTORES; s++) {
      if (!salidas[String(s)]) salidas[String(s)] = { nombre: `Sector ${s}`, tipo: 0 };
      if (salidas[String(s)].tipo === undefined) salidas[String(s)].tipo = 0;
    }

    // Caudalimetros (calibracion)
    const caudalSnap = await getDoc(doc(db, 'Unidades', deviceId, 'Config', 'caudalimetros'));
    caudalimetros = caudalSnap.exists() ? caudalSnap.data() : { litros_pulso_agua: 0, litros_pulso_fert: 0 };

    // Programas
    programas = {};
    const pSnap = await getDocs(collection(db, 'Unidades', deviceId, 'Programas'));
    pSnap.forEach(d => { programas[d.id] = d.data(); });
    for (let p = 1; p <= 5; p++) {
      if (!programas[String(p)]) {
        programas[String(p)] = { 
          activo: false, hora_inicio: '00:00', dias: [false,false,false,false,false,false,false], 
          sectores: {},
          fertilizacion: { agua_antes: 0, litros: 0, agua_despues: 0 }
        };
      }
      for (let s = 1; s <= NUM_SECTORES; s++) {
        if (!programas[String(p)].sectores) programas[String(p)].sectores = {};
        if (!programas[String(p)].sectores[String(s)]) {
          programas[String(p)].sectores[String(s)] = { habilitado: false, horas: 0, minutos: 0 };
        }
        if (!programas[String(p)].sectores[String(s)].fert) {
          programas[String(p)].sectores[String(s)].fert = { activa: false, tipo: 0, agua_antes: 0, litros: 0, agua_despues: 0 };
        }
      }
    }
  }

  /* ---------- MQTT ---------- */
  function pub(cmd, token) {
    if (!mqttClient?.connected) return;
    mqttClient.publish(`ctrl12/${deviceId}/cmd`, `${token||tokenObs}:${cmd}`);
  }

  function conectarMQTT() {
    mqttClient = mqtt.connect(`wss://${MQTT_HOST}:8884/mqtt`, {
      username: MQTT_USER, password: MQTT_PASS,
      clientId: 'ctrl12eq_' + Math.random().toString(16).slice(2),
      keepalive: 60,
      reconnectPeriod: 3000,
      connectTimeout: 10000,
      clean: true
    });

    mqttClient.on('connect', () => {
      document.getElementById('conexionBadge').classList.remove('offline');
      document.getElementById('conexionBadge').classList.add('online');
      document.getElementById('conexionBadge').textContent = 'ON LINE';
      mqttClient.subscribe(`ctrl12/${deviceId}/resp`);
      pub('GETESTADO');
      setInterval(() => pub('GETESTADO'), 3000);
      
      // ✓ PUBLICAR nombres de sectores a pantalla (al conectar MQTT)
      for (let s = 1; s <= NUM_SECTORES; s++) {
        if (salidas[String(s)]) {
          const nombre = salidas[String(s)].nombre || `Sector ${s}`;
          const tipo = salidas[String(s)].tipo || 0;
          mqttClient.publish(`ctrl12/${deviceId}/resp`, `SAL:${s}:${tipo}:${nombre}`);
        }
      }
      
      // Al conectar tras reset: re-guardar config
      console.log('[Sync] Re-guardando configuración...');
      setTimeout(async () => {
        await guardarProg();
        await new Promise(r => setTimeout(r, 500));
        await guardarSalidas();
      }, 500);
    });

    mqttClient.on('message', (topic, payload) => {
      const msg = payload.toString();
      if (msg.startsWith('EST:')) procesarEstado(msg);
      if (msg.startsWith('REG:')) window.procesarHistorial(msg);
    });

    mqttClient.on('error', err => {
      console.error('MQTT:', err);
      document.getElementById('conexionBadge').classList.remove('online');
      document.getElementById('conexionBadge').classList.add('offline');
      document.getElementById('conexionBadge').textContent = 'OFF LINE';
    });
  }

  function procesarEstado(msg) {
    const p = msg.split(':');
    estadoActual = {
      sector:   parseInt(p[1])||0,
      programa: parseInt(p[2])||0,
      m3:       parseFloat(p[3])||0,
      estado:   parseInt(p[4])||0,
      elapsed:  parseInt(p[5])||0,
      hCfg:     parseInt(p[6])||0,
      mCfg:     parseInt(p[7])||0,
      pausa:    p[8]==='1',
      modo:     parseInt(p[9])||0,
      durTotal: parseInt(p[10])||0,
      placa2:   p[11]||'TIMEOUT',
      hora:     p[12]||'00:00',
      sectorTrans: parseInt(p[13])||0,
      fertilizando: p[14]==='1',
      aux0: { enUso: p[15]==='1', programa: parseInt(p[16])||0, salida: parseInt(p[17])||0, elapsed: parseInt(p[18])||0, durTotal: parseInt(p[19])||0 },
      aux1: { enUso: p[20]==='1', programa: parseInt(p[21])||0, salida: parseInt(p[22])||0, elapsed: parseInt(p[23])||0, durTotal: parseInt(p[24])||0 }
    };
    actualizarEstadoUI();
    // ✓ REPUBLICAR a pantalla (CrowPanel recibe estado en tiempo real desde web)
    if (mqttClient && mqttClient.isConnected && mqttClient.isConnected()) {
      mqttClient.publish(`ctrl12/${deviceId}/resp`, msg);
    }
  }

  /* ---------- ESTADO UI ---------- */
  function actualizarEstadoUI() {
    const e = estadoActual;
    const estados = ['Inactivo','Regando','Falla','Config'];
    const el = document.getElementById('estadoLive');
    const titulo = document.getElementById('estadoTitulo');
    
    if (!el || !titulo) return;

    // Aplicar parpadeo si hay pausa
    if (e.pausa) {
      titulo.classList.add('parpadeo');
    } else {
      titulo.classList.remove('parpadeo');
    }

    const pct = e.durTotal > 0 ? Math.min(100, Math.round(e.elapsed/e.durTotal*100)) : 0;
    const rest = Math.max(0, e.durTotal - e.elapsed);
    const p2cls = e.placa2 === 'OK' ? 'ok' : '';
    const sectorNombre = e.sector > 0 ? (salidas[String(e.sector)]?.nombre || `Sector ${e.sector}`) : '—';
    const pausaHTML = e.pausa ? `<div class="fila-estado"><span>Pausa</span><span class="pausa-alerta" style="color: #fff !important;">PAUSADO</span></div>` : '';

    // Nombres de las salidas auxiliares actualmente activas (0, 1 o 2 slots)
    const auxActivos = [e.aux0, e.aux1]
      .filter(a => a && a.enUso && a.salida > 0)
      .map(a => salidas[String(a.salida)]?.nombre || `Auxiliar ${a.salida}`);
    const auxTexto = auxActivos.length ? auxActivos.join(', ') : '—';

    // Programa(s) auxiliar(es) activos (para la fila "Programa" cuando se
    // esta mostrando el auxiliar en la fila alternante)
    const auxProgramas = [e.aux0, e.aux1]
      .filter(a => a && a.enUso)
      .map(a => a.programa > 0 ? `Prog ${a.programa}` : 'Manual');
    const auxProgramaTexto = auxProgramas.length ? [...new Set(auxProgramas)].join(', ') : '—';

    // Fila que alterna cada 3s entre Sector de riego y Auxiliar(es) activo(s)
    const filaAlternante = mostrarAuxEnEstado
      ? `<div class="fila-estado"><span>Auxiliar${auxActivos.length>1?'es':''} activo${auxActivos.length>1?'s':''}</span><span style="color:#000">${auxTexto}</span></div>`
      : `<div class="fila-estado"><span>Sector activo</span><span style="color:#000">${sectorNombre}</span></div>`;

    // La fila Programa acompaña la alternancia: muestra el programa principal
    // o el/los programa(s) auxiliar(es), segun lo que se este mostrando arriba.
    const filaPrograma = mostrarAuxEnEstado
      ? `<div class="fila-estado"><span>Programa auxiliar</span><span style="color:#000">${auxProgramaTexto}</span></div>`
      : `<div class="fila-estado"><span>Programa</span><span>${e.programa>0?`Prog ${e.programa}`:'Manual'}</span></div>`;

    el.innerHTML = `
      <div class="fila-estado"><span>Estado</span><span>${estados[e.estado]||'?'}</span></div>
      ${filaAlternante}
      ${filaPrograma}
      <div class="fila-estado"><span>Transcurrido</span><span>${fmtSeg(e.elapsed)}</span></div>
      <div class="fila-estado"><span>Restante</span><span>${fmtSeg(rest)}</span></div>
      <div class="fila-estado"><span>Hora</span><span>${e.hora}</span></div>
      <div class="fila-estado"><span>Placa 2</span><span><span class="badge-placa2 ${p2cls}">${e.placa2}</span></span></div>
      ${pausaHTML}
      ${e.estado===1?`<div class="barra-progreso"><div class="barra-fill" style="width:${pct}%"></div></div>`:''}
    `;

    // Actualizar grid sectores y ocultar placa 2 si está down
    const CIRCUNFERENCIA = 169.6;
    const placa2Down = e.placa2 !== 'OK';
    for (let s = 1; s <= NUM_SECTORES; s++) {
      const circulo = document.getElementById(`circulo-${s}`);
      const etxt    = document.getElementById(`etxt-${s}`);
      const badge   = document.getElementById(`badge-p2-${s}`);
      const btnMan  = document.getElementById(`btn-manual-${s}`);
      const anillo  = document.getElementById(`anillo-${s}`);
      
      if (!circulo || !etxt) continue;
      
      // Ocultar sectores 7-12 si placa 2 está down
      if (s > 6 && placa2Down) {
        circulo.parentElement.style.display = 'none';
        if (btnMan) btnMan.style.display = 'none';
      } else {
        circulo.parentElement.style.display = 'block';
        if (btnMan) btnMan.style.display = 'block';
      }
      
      // Ocultar badge P2 si placa 2 está down
      if (badge) badge.style.display = placa2Down ? 'none' : 'block';

      const tipo = salidas[String(s)]?.tipo ?? 0;
      const esBomba = tipo === TIPO_BOMBA_RIEGO;
      const esFertilizador = tipo === TIPO_BOMBA_INYECTORA || tipo === TIPO_VALVULA_FERT;
      const esSectorPrincipal = s === e.sector && e.estado === 1;
      const esSectorTraslape = s === e.sectorTrans && e.sectorTrans > 0 && e.estado === 1;
      const bombaActiva = esBomba && e.estado === 1;
      const fertilizadorActivo = esFertilizador && e.fertilizando && e.estado === 1;
      const esAuxiliar = tipo === TIPO_AUXILIAR;
      const auxiliarActivo = esAuxiliar && (
        (e.aux0 && e.aux0.enUso && e.aux0.salida === s) ||
        (e.aux1 && e.aux1.enUso && e.aux1.salida === s)
      );

      if (auxiliarActivo) {
        circulo.style.background = '#000';
        etxt.textContent = 'Activo';
        if (anillo) anillo.style.strokeDashoffset = 0;
      } else if (fertilizadorActivo) {
        circulo.style.background = 'var(--amarillo)';
        etxt.textContent = 'Fertilizando';
        if (anillo) anillo.style.strokeDashoffset = 0;
      } else if (esSectorPrincipal) {
        circulo.style.background = 'var(--verde-ws)';
        etxt.textContent = e.pausa ? 'Pausado' : 'Regando';
        if (anillo) anillo.style.strokeDashoffset = CIRCUNFERENCIA * (1 - pct / 100);
      } else if (esSectorTraslape || bombaActiva) {
        circulo.style.background = 'var(--verde-ws)';
        etxt.textContent = e.pausa ? 'Pausado' : 'Regando';
        if (anillo) anillo.style.strokeDashoffset = 0;
      } else {
        circulo.style.background = 'var(--azul)';
        etxt.textContent = 'No activo';
        if (anillo) anillo.style.strokeDashoffset = CIRCUNFERENCIA;
      }
    }

    // Botón pausa
    const btnP = document.getElementById('btnPausa');
    if (btnP) {
      if (e.pausa) {
        btnP.textContent = 'Reanudar';
        btnP.classList.add('peligro');
        btnP.classList.remove('primario');
      } else {
        btnP.textContent = 'Pausar';
        btnP.classList.remove('peligro');
        btnP.classList.add('primario');
      }
    }
  }

  window.procesarHistorial = function(msg) {
    const p = msg.split(':');
    const n = parseInt(p[1]) || 0;
    if (n === 0) {
      const el = document.getElementById('historialCuerpo');
      if (el) el.innerHTML = '<p style="color:var(--texto-tenue);font-size:13px;">Sin riegos registrados.</p>';
      return;
    }
    let html = '';
    for (let i = 0; i < n; i++) {
      const idx = 2 + i * 9;
      const dia      = p[idx]   || '?';
      const mes      = p[idx+1] || '?';
      const hora     = p[idx+2] || '?';
      const min      = p[idx+3] || '?';
      const sector   = parseInt(p[idx+4]) || 0;
      const programa = parseInt(p[idx+5]) || 0;
      const durSeg   = parseInt(p[idx+6]) || 0;
      const m3       = parseFloat(p[idx+7]) || 0;
      const fertUsada = p[idx+8] === '1';
      const dur = Math.floor(durSeg/60) + 'm ' + (durSeg%60) + 's';
      const prog = programa > 0 ? 'Prog ' + programa : 'Manual';
      const lineaStyle = fertUsada ? ' style="color:var(--amarillo)"' : '';
      html += '<div class="fila-historial">'
            + '<div class="linea1"' + lineaStyle + '>' + prog + ' — Sector ' + sector + '</div>'
            + '<div class="linea2">' + dia + '/' + mes + ' ' + hora + ':' + min + ' · ' + dur + ' · ' + m3.toFixed(3) + ' m³</div>'
            + '</div>';
    }
    const el = document.getElementById('historialCuerpo');
    if (el) {
      el.innerHTML = html;
      el.closest('.seccion').classList.add('abierta');
    }
  }

              <span class="sector-nombre">${nombre}</span>
              <label class="switch fert-switch" style="width:26px;height:16px" title="Fertilizar">
                <input type="checkbox" class="chk-fert" data-s="${s}" ${fert.activa?'checked':''} onchange="toggleFert(${s},this.checked)">
                <div class="switch-track"></div>
                <div class="switch-thumb" style="top:2px;left:2px;width:12px;height:12px"></div>
              </label>
              <input type="number" class="dur-inp" id="h-${s}" value="${sc.horas}" min="0" max="23" ${sc.habilitado?'':'disabled'}>
              <input type="number" class="dur-inp" id="m-${s}" value="${sc.minutos}" min="0" max="59" ${sc.habilitado?'':'disabled'}>
            </div>
            <div class="sector-fert-row" id="fertrow-${s}" style="display:${fert.activa?'block':'none'}">
              <div class="fert-toggle-row">
                <span class="fert-label">Tipo</span>
                <select class="fert-tipo-sel" id="ftipo-${s}">
                  <option value="0" ${fert.tipo==0?'selected':''}>Directa</option>
                  <option value="1" ${fert.tipo==1?'selected':''}>Fraccionada</option>
                </select>
              </div>
              <div class="fert-row">
                <div><div class="fert-label">Agua antes (L)</div><input type="number" class="fert-inp" id="fa-${s}" value="${fert.agua_antes}" min="0" max="1000"></div>
                <div><div class="fert-label">Litros fert</div><input type="number" class="fert-inp" id="fl-${s}" value="${fert.litros}" min="0" max="1000"></div>
                <div><div class="fert-label">Agua después (L)</div><input type="number" class="fert-inp" id="fd-${s}" value="${fert.agua_despues}" min="0" max="1000"></div>
              </div>
            </div>`;
        }).join('')}
      </div>
      <div class="btns-prog">
        <button class="btn-guardar" onclick="guardarProg()">Guardar</button>
        <button class="btn-iniciar-prog" onclick="pub('INICIAR:${progActual}', window.tokenOp); mostrarToast('Iniciando programa ${progActual}…')">Iniciar ahora</button>
        <button class="btn-detener-prog" onclick="pub('DETENERPROG:${progActual}', window.tokenOp); mostrarToast('Deteniendo programa ${progActual}…')">Detener</button>
      </div>
    `;
  }

  window.selProg = function(p) {
    progActual = p;
    document.getElementById('seccionProgramas').innerHTML = renderProgramas();
  };

  window.toggleSec = function(s, on) {
    document.getElementById(`h-${s}`).disabled = !on;
    document.getElementById(`m-${s}`).disabled = !on;
  };

  window.toggleFert = function(s, on) {
    const row = document.getElementById(`fertrow-${s}`);
    if (row) row.style.display = on ? 'block' : 'none';
  };

  window.guardarProg = async function() {
    const prog = programas[String(progActual)];
    prog.activo = document.getElementById('chkActivo')?.checked || false;
    prog.hora_inicio = document.getElementById('inputHora')?.value || '00:00';

    const chips = document.querySelectorAll('.dia-chip');
    prog.dias = [...chips].map(c => c.classList.contains('sel'));

    for (let s = 1; s <= NUM_SECTORES; s++) {
      const hab = document.querySelector(`.chk-sec[data-s="${s}"]`)?.checked || false;
      const h   = parseInt(document.getElementById(`h-${s}`)?.value)||0;
      const m   = parseInt(document.getElementById(`m-${s}`)?.value)||0;
      const fertActiva = document.querySelector(`.chk-fert[data-s="${s}"]`)?.checked || false;
      const fertTipo   = parseInt(document.getElementById(`ftipo-${s}`)?.value) || 0;
      const aguaAntes  = parseFloat(document.getElementById(`fa-${s}`)?.value) || 0;
      const litrosFert = parseFloat(document.getElementById(`fl-${s}`)?.value) || 0;
      const aguaDespues= parseFloat(document.getElementById(`fd-${s}`)?.value) || 0;
      prog.sectores[String(s)] = {
        habilitado: hab, horas: h, minutos: m,
        fert: { activa: fertActiva, tipo: fertTipo, agua_antes: aguaAntes, litros: litrosFert, agua_despues: aguaDespues }
      };
    }

    // Intentar guardar en Firestore, pero NO detener si falla
    try {
      await setDoc(doc(db, 'Unidades', deviceId, 'Programas', String(progActual)), prog);
    } catch (err) {
      console.error('[Firestore] Error guardando programa:', err);
      // Continúar aunque Firestore falle — el ESP32 debe recibir los comandos igual
    }

    // Estos SIEMPRE se mandan al ESP32, independientemente de Firestore
    const [hh, mm] = (prog.hora_inicio||'00:00').split(':');
    pub(`SETPROG:${progActual},${prog.activo?1:0},0,${hh||0},${mm||0}`, window.tokenOp);
    pub(`SETDIAS:${progActual},${prog.dias.map(d=>d?1:0).join(',')}`, window.tokenOp);
    for (let s = 1; s <= NUM_SECTORES; s++) {
      const sc = prog.sectores[String(s)];
      const f = sc.fert;
      pub(`SETSECTOR:${progActual},${s},${sc.habilitado?1:0},${sc.horas},${sc.minutos},${f.activa?1:0},${f.tipo},${f.agua_antes},${f.litros},${f.agua_despues}`, window.tokenOp);
    }

    mostrarToast(`Programa ${progActual} guardado ✓`);
  };

  /* ---------- SALIDAS ---------- */
  function renderSalidas() {
    const el = document.getElementById('seccionSalidas');
    if (!el) return;
    el.innerHTML = `
      ${[...Array(NUM_SECTORES)].map((_,i) => {
        const s = i+1;
        const sal = salidas[String(s)] || { nombre: `Sector ${s}`, tipo: 0 };
        return `
          <div class="salida-row">
            <input type="text" class="salida-nombre-inp" id="sal-nombre-${s}" value="${sal.nombre}">
            <select class="salida-tipo-sel" id="sal-tipo-${s}">
              ${TIPOS_SALIDA.map((t, idx) => `<option value="${idx}" ${sal.tipo==idx?'selected':''}>${idx+1}. ${t}</option>`).join('')}
            </select>
          </div>`;
      }).join('')}
      <div style="margin-top:14px">
        <div style="font-size:12px;font-weight:600;margin-bottom:4px;color:var(--texto-tenue)">CAUDALÍMETROS</div>
        <div class="caudal-row">
          <label>Caudalímetro Agua</label>
          <select class="salida-tipo-sel" id="caudal-agua">
            ${CAUDAL_AGUA_OPCIONES.map(o => `<option value="${o.value}" ${caudalimetros.litros_pulso_agua==o.value?'selected':''}>${o.label}</option>`).join('')}
          </select>
        </div>
        <div class="caudal-row">
          <label>Caudalímetro Fertilizante</label>
          <select class="salida-tipo-sel" id="caudal-fert">
            ${CAUDAL_FERT_OPCIONES.map(o => `<option value="${o.value}" ${caudalimetros.litros_pulso_fert==o.value?'selected':''}>${o.label}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="btns-prog">
        <button class="btn-guardar" onclick="guardarSalidas()">Guardar Salidas</button>
      </div>
    `;
  }

  window.guardarSalidas = async function() {
    for (let s = 1; s <= NUM_SECTORES; s++) {
      const nombre = document.getElementById(`sal-nombre-${s}`)?.value || `Sector ${s}`;
      const tipo   = parseInt(document.getElementById(`sal-tipo-${s}`)?.value) || 0;
      salidas[String(s)] = { nombre, tipo };
      try {
        await setDoc(doc(db, 'Unidades', deviceId, 'Salidas', String(s)), { nombre, tipo });
      } catch (err) {
        console.error(`[Firestore] Error guardando salida ${s}:`, err);
        // Continuar aunque Firestore falle -- el ESP32 debe recibir el comando igual
      }
      pub(`SETSALIDA:${s},${tipo},${nombre}`, window.tokenOp);
    }

    const litrosAgua = parseFloat(document.getElementById('caudal-agua')?.value) || 0;
    const litrosFert = parseFloat(document.getElementById('caudal-fert')?.value) || 0;
    caudalimetros = { litros_pulso_agua: litrosAgua, litros_pulso_fert: litrosFert };
    try {
      await setDoc(doc(db, 'Unidades', deviceId, 'Config', 'caudalimetros'), caudalimetros);
    } catch (err) {
      console.error('[Firestore] Error guardando caudalímetros:', err);
    }
    pub(`SETCAUDAL:0,${litrosAgua}`, window.tokenOp);
    pub(`SETCAUDAL:1,${litrosFert}`, window.tokenOp);

    mostrarToast('Salidas guardadas ✓');
  };

  /* ---------- UTILS ---------- */
  function fmtSeg(s) {
    const m = Math.floor(s/60); const ss = s%60;
    return `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
  }

  function mostrarToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('visible');
    setTimeout(() => t.classList.remove('visible'), 2500);
  }

</script>

<script src="https://unpkg.com/mqtt@5.10.0/dist/mqtt.min.js"></script>

</body>
</html>
