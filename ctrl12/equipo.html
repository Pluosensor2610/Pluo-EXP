<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ctrl12 — Equipo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --azul:       #1976D2;
    --teal:       #00897B;
    --teal-light: #E0F2F1;
    --verde-ws:   #25D366;
    --gris:       #B9C2C6;
    --naranja:    #E65100;
    --amarillo:   #FBBC04;
    --alerta:     #E24C4C;
    --texto:      #1A2B33;
    --texto-tenue:#6B7C85;
    --blanco:     #FFFFFF;
    --fondo:      #F4F7F9;
  }

  @keyframes parpadeoRojo {
    0%, 100% { background: var(--verde-ws); color: #fff; }
    50% { background: var(--alerta); color: #fff; }
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; min-height: 100vh; background: var(--fondo); font-family: 'Manrope', sans-serif; color: var(--texto); }
  button { cursor: pointer; font-family: 'Manrope', sans-serif; }

  /* HEADER */
  header {
    background: var(--azul); color: var(--blanco);
    padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  header .header-left { display: flex; align-items: center; gap: 12px; flex: 1; }
  #btnVolver {
    background: rgba(255,255,255,0.15); border: none; color: var(--blanco);
    width: 34px; height: 34px; border-radius: 8px; font-size: 18px; flex-shrink: 0;
  }
  .header-titles { min-width: 0; }
  .header-titles h1 { font-size: 16px; margin: 0; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .header-titles p { font-size: 11px; margin: 0; opacity: 0.85; font-family: 'IBM Plex Mono', monospace; }
  
  .logo-pluo {
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-pluo img { width: 28px; height: 28px; border-radius: 50%; }

  .conexion-badge {
    padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 700;
    color: #fff; font-family: 'IBM Plex Mono', monospace; white-space: nowrap;
  }
  .conexion-badge.online { background: var(--verde-ws); }
  .conexion-badge.offline { background: var(--alerta); }

  /* NAVEGACION TABS */
  .nav-tabs {
    background: var(--blanco); border-bottom: 1px solid #E0E0E0;
    display: flex; gap: 0; position: sticky; top: 52px; z-index: 9;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .nav-tabs button {
    flex: 1; min-width: 80px; padding: 12px 16px;
    border: none; background: transparent; color: var(--texto-tenue);
    font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
    cursor: pointer; border-bottom: 3px solid transparent;
    transition: all 0.2s ease;
  }
  .nav-tabs button:hover { color: var(--azul); }
  .nav-tabs button.activo { color: var(--azul); border-bottom-color: var(--azul); }

  main { max-width: 480px; margin: 0 auto; padding: 16px; min-height: calc(100vh - 140px); }

  /* SECCION */
  .seccion { display: none; }
  .seccion.activo { display: block; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* TARJETA ESTADO */
  .tarjeta-card {
    background: var(--blanco); border-radius: 12px;
    padding: 16px; margin-bottom: 16px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
  }
  .tarjeta-card h2 {
    font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em;
    color: #fff; margin: 0 0 12px 0;
    background: var(--verde-ws); padding: 8px 12px; border-radius: 8px;
    transition: background 0.3s ease;
  }
  .tarjeta-card h2.parpadeo { animation: parpadeoRojo 1s infinite; }
  .fila-estado { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; border-bottom: 1px solid #F0F0F0; }
  .fila-estado:last-child { border-bottom: none; }
  .fila-estado span:first-child { color: var(--texto-tenue); }
  .fila-estado span:last-child { color: var(--texto); font-weight: 600; }

  /* GRID SECTORES */
  .grid-sectores { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
  .tarjeta-sector {
    background: var(--blanco); border-radius: 12px;
    padding: 12px 6px; text-align: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    position: relative;
  }
  .tarjeta-sector .nombre {
    font-size: 11px; font-weight: 700; margin-bottom: 8px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .circulo-wrap {
    position: relative; width: 64px; height: 64px; margin: 0 auto 8px auto;
  }
  .anillo-svg {
    position: absolute; top: 0; left: 0; width: 64px; height: 64px;
    transform: rotate(-90deg);
  }
  .anillo-track { fill: none; stroke: #E8ECEE; stroke-width: 6; }
  .anillo-fill {
    fill: none; stroke: var(--verde-ws); stroke-width: 6; stroke-linecap: round;
    stroke-dasharray: 169.6; stroke-dashoffset: 169.6;
    transition: stroke-dashoffset 1s linear;
  }
  .circulo-icono {
    position: absolute; top: 14px; left: 14px;
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--azul);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s ease;
  }
  .circulo-icono svg { width: 20px; height: 20px; }
  .badge-p2 {
    position: absolute; top: 5px; right: 5px;
    font-size: 8px; font-weight: 700; color: var(--naranja);
    font-family: 'IBM Plex Mono', monospace;
  }

  /* BOTONES CONTROL */
  .botones-control { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .btn-ctrl {
    padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 700;
    border: 1px solid var(--gris); background: var(--blanco); color: var(--texto);
  }
  .btn-ctrl.primario { background: var(--azul); color: #fff; border-color: var(--azul); }
  .btn-ctrl.peligro { background: var(--alerta); color: #fff; border-color: var(--alerta); }
  .btn-ctrl:disabled { opacity: 0.4; cursor: not-allowed; }

  /* RIEGO MANUAL */
  .manual-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
  .btn-sector-manual {
    padding: 8px 4px; border-radius: 8px; font-size: 11px; font-weight: 700;
    border: 1px solid var(--gris); background: var(--blanco); color: var(--texto); text-align: center;
  }
  .btn-sector-manual.sel { background: var(--azul); color: #fff; border-color: var(--azul); }
  .fila-manual { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .fila-manual label { font-size: 13px; font-weight: 600; color: var(--texto-tenue); white-space: nowrap; }
  .input-min {
    flex: 1; padding: 8px; text-align: center;
    border: 1px solid var(--gris); border-radius: 8px;
    font-size: 15px; font-weight: 700; outline: none; background: var(--fondo);
  }
  .input-min:focus { border-color: var(--azul); }

  /* SALIDAS */
  .salida-row {
    display: grid; grid-template-columns: 2fr 1fr; gap: 8px;
    padding: 10px 0; border-bottom: 1px solid #F0F0F0; align-items: center;
  }
  .salida-nombre-inp {
    padding: 8px; border: 1px solid var(--gris); border-radius: 6px;
    font-size: 13px; font-weight: 600; outline: none; background: var(--blanco);
  }
  .salida-nombre-inp:focus { border-color: var(--azul); }
  .salida-tipo-sel {
    padding: 8px; border: 1px solid var(--gris); border-radius: 6px;
    font-size: 13px; font-weight: 600; outline: none; background: var(--blanco);
  }
  .salida-tipo-sel:focus { border-color: var(--azul); }

  .caudal-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    padding: 8px 0; border-bottom: 1px solid #F0F0F0; align-items: center;
  }
  .caudal-row label { font-size: 12px; font-weight: 600; color: var(--texto-tenue); }

  .btn-guardar, .btn-iniciar-prog {
    flex: 1; padding: 10px; border-radius: 8px; border: none;
    font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .btn-guardar { background: var(--azul); color: #fff; }
  .btn-iniciar-prog { background: var(--verde-ws); color: #fff; }
  .btn-guardar:hover, .btn-iniciar-prog:hover { opacity: 0.9; }

  /* HISTORIAL */
  .historial-list { font-family: 'IBM Plex Mono', monospace; font-size: 11px; line-height: 1.5; }
  .historial-entry { padding: 8px 0; border-bottom: 1px solid #F0F0F0; color: var(--texto); }
  .historial-entry:last-child { border-bottom: none; }

  /* TOAST */
  #toast {
    position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%);
    background: var(--texto); color: #fff; padding: 12px 20px;
    border-radius: 8px; font-size: 13px; font-weight: 600;
    transition: bottom 0.3s ease; z-index: 1000;
  }
  #toast.visible { bottom: 20px; }

</style>
</head>
<body>

<header>
  <div class="header-left">
    <button id="btnVolver">←</button>
    <div class="header-titles">
      <h1 id="dispositivo">Ctrl12</h1>
      <p id="estado-txt">Conectando...</p>
    </div>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <span class="conexion-badge" id="conexion">OFFLINE</span>
    <div class="logo-pluo" title="Pluo">
      <img src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAgGBgcGBQgHBwcJCQgKDBQNDAsLDBkSEw8UHRofHh0aHBwgJC4nICIsIxwcKDcpLDAx" alt="Pluo" style="width:28px;height:28px;border-radius:50%">
    </div>
  </div>
</header>

<nav class="nav-tabs">
  <button class="activo" onclick="cambiarTab('equipo')">Equipo</button>
  <button onclick="cambiarTab('salidas')">Salidas</button>
  <button onclick="cambiarTab('historial')">Historial</button>
</nav>

<main>

  <!-- EQUIPO -->
  <section id="seccion-equipo" class="seccion activo">
    <div class="tarjeta-card" id="tarjetaEstado">
      <h2 id="titulo-estado">ESTADO DE RIEGO</h2>
      <div class="fila-estado"><span>Estado</span><span id="val-estado">Inactivo</span></div>
      <div class="fila-estado"><span>Sector activo</span><span id="val-sector">-</span></div>
      <div class="fila-estado"><span>Programa</span><span id="val-programa">Manual</span></div>
      <div class="fila-estado"><span>Transcurrido</span><span id="val-elapsed">00:00</span></div>
      <div class="fila-estado"><span>Restante</span><span id="val-restante">00:00</span></div>
      <div class="fila-estado"><span>Hora</span><span id="val-hora">-</span></div>
      <div class="fila-estado"><span>Placa 2</span><span id="val-placa2" style="color:var(--verde-ws);">-</span></div>
    </div>

    <div class="botones-control">
      <button class="btn-ctrl primario" id="btnPausar" onclick="pausarReanudar()">Pausar</button>
      <button class="btn-ctrl peligro" id="btnDetener" onclick="detenerPrograma()">Detener</button>
    </div>

    <div class="tarjeta-card">
      <h2>RIEGO MANUAL</h2>
      <div class="manual-grid" id="gridManual"></div>
      <div class="fila-manual">
        <label>Duración:</label>
        <input type="number" class="input-min" id="duracionMin" min="0" max="999" value="10">
        <span style="font-size:12px;color:var(--texto-tenue);">min</span>
      </div>
      <button class="btn-ctrl primario" style="width:100%;margin-top:8px" onclick="riegoManual()">Iniciar Riego Manual</button>
    </div>

    <div class="tarjeta-card">
      <h2>SECTORES EN VIVO</h2>
      <div class="grid-sectores" id="gridSectores"></div>
    </div>
  </section>

  <!-- SALIDAS -->
  <section id="seccion-salidas" class="seccion">
    <div class="tarjeta-card" id="cardSalidas"></div>
  </section>

  <!-- HISTORIAL -->
  <section id="seccion-historial" class="seccion">
    <div class="tarjeta-card">
      <h2>ÚLTIMOS RIEGOS</h2>
      <div class="historial-list" id="listaHistorial">Cargando...</div>
    </div>
  </section>

</main>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js"></script>
<script src="https://unpkg.com/mqtt@5.10.0/dist/mqtt.min.js"></script>

<script>
  const NUM_SECTORES = 12;
  const TIPOS_SALIDA = ['Riego','Bomba riego','Auxiliar','Bomba inyectora','Válvula fert','Sin asignar'];
  const CAUDAL_AGUA_OPCIONES = [
    {value:0.5,label:'0.5 L/pulso'},{value:1,label:'1 L/pulso'},{value:2,label:'2 L/pulso'},
    {value:5,label:'5 L/pulso'},{value:10,label:'10 L/pulso'}
  ];
  const CAUDAL_FERT_OPCIONES = [
    {value:0.1,label:'0.1 L/pulso'},{value:0.5,label:'0.5 L/pulso'},{value:1,label:'1 L/pulso'},
    {value:2,label:'2 L/pulso'},{value:5,label:'5 L/pulso'}
  ];

  let deviceId = 'CE000001';
  let estado = {sector:0,programa:0,m3:0,estado:0,elapsed:0,h_cfg:0,m_cfg:0,pausa:false,modo:0,dur_total:0,placa2:'-',hora:'-',sector_trans:0,fertilizando:false};
  let salidas = {};
  let caudalimetros = {litros_pulso_agua:1,litros_pulso_fert:0.5};
  let historial = [];
  let mqtt = null;
  const TOKEN_OBS_ = 'OBS-CTRL-7f21';
  const TOKEN_OP_ = 'OP-CTRL-4m9q';

  // ===== NAVEGACION =====
  window.cambiarTab = function(tab) {
    document.querySelectorAll('.seccion').forEach(s => s.classList.remove('activo'));
    document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('activo'));
    document.getElementById(`seccion-${tab}`).classList.add('activo');
    event.target.classList.add('activo');
    if (tab === 'salidas') renderSalidas();
    if (tab === 'historial') {pub('GETREGISTROS', TOKEN_OBS_); actualizarHistorial();}
  };

  const firebaseConfig = {
    apiKey: "AIzaSyCrU-C4CK_WxH5ZpNkuNZhY2F8KhRzPtCE",
    authDomain: "pluo-compact-cef5og.firebaseapp.com",
    projectId: "pluo-compact-cef5og",
    storageBucket: "pluo-compact-cef5og.appspot.com",
    messagingSenderId: "641862193387",
    appId: "1.0.0"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const MQTT_HOST = 'e0b71edcce184b74a7a5a87fc9d2b605.s1.eu.hivemq.cloud';
  const MQTT_PORT = 8883;
  const MQTT_USER = 'pluo_firmware';
  const MQTT_PASS = 'Pluo2012';

  const clientOptions = {clean:true,connectTimeout:4000,reconnectPeriod:1000,username:MQTT_USER,password:MQTT_PASS};
  mqtt = mqtt.connect(`wss://${MQTT_HOST}:${MQTT_PORT}/mqtt`, clientOptions);
  mqtt.on('message', (topic, payload) => {
    const msg = payload.toString();
    if (msg.startsWith('EST:')) parsear_est(msg.substring(4));
    if (msg.startsWith('REG:')) parsear_reg(msg.substring(4));
    if (msg.startsWith('SAL:')) parsear_sal(msg.substring(4));
    actualizarUI();
  });
  mqtt.subscribe(`ctrl12/${deviceId}/resp`);

  function pub(cmd, token) {
    if (!mqtt || !mqtt.connected) return;
    mqtt.publish(`ctrl12/${deviceId}/cmd`, `${token}:${cmd}`);
  }

  function parsear_est(d) {
    const p = d.split(':');
    estado = {
      sector:+p[0],programa:+p[1],m3:+p[2],estado:+p[3],elapsed:+p[4],h_cfg:+p[5],m_cfg:+p[6],
      pausa:+p[8]==1,modo:+p[9],dur_total:+p[10],placa2:p[11],hora:p[12],sector_trans:+p[13],
      fertilizando:+p[14]==1
    };
  }

  function parsear_reg(d) {
    const [n,...regs] = d.split(':');
    historial = [];
    for (let i = 0; i < +n; i++) {
      const fields = regs.slice(i*9, i*9+9);
      historial.push({dia:+fields[0],mes:+fields[1],hora:+fields[2],min:+fields[3],sector:+fields[4],prog:+fields[5],dur:+fields[6],m3:+fields[7],fert:+fields[8]});
    }
  }

  function parsear_sal(d) {
    const p = d.split(':');
    const sec = +p[0];
    if (sec >= 1 && sec <= NUM_SECTORES) {
      const tipo = +p[1];
      const nombre = p.slice(2).join(':');
      salidas[String(sec)] = {nombre, tipo};
    }
  }

  function actualizarUI() {
    document.getElementById('val-estado').textContent = ['Inactivo','Regando','Falla','Config'][estado.estado]||'?';
    document.getElementById('val-sector').textContent = estado.sector > 0 ? (salidas[String(estado.sector)]?.nombre || `Sector ${estado.sector}`) : '-';
    document.getElementById('val-programa').textContent = estado.programa > 0 ? `Prog ${estado.programa}` : 'Manual';
    document.getElementById('val-elapsed').textContent = fmtSeg(estado.elapsed);
    document.getElementById('val-restante').textContent = fmtSeg(Math.max(0, estado.dur_total - estado.elapsed));
    document.getElementById('val-hora').textContent = estado.hora;
    
    const p2ok = estado.placa2 === 'OK';
    document.getElementById('val-placa2').textContent = estado.placa2;
    document.getElementById('val-placa2').style.color = p2ok ? 'var(--verde-ws)' : 'var(--alerta)';
    
    document.getElementById('titulo-estado').className = estado.pausa ? 'parpadeo' : '';
    document.getElementById('btnPausar').textContent = estado.pausa ? 'Reanudar' : 'Pausar';
    document.getElementById('btnPausar').disabled = estado.estado !== 1;
    document.getElementById('btnDetener').disabled = estado.estado !== 1;

    renderSectores();
  }

  function renderSectores() {
    const grid = document.getElementById('gridSectores');
    grid.innerHTML = [...Array(NUM_SECTORES)].map((_,i) => {
      const s = i + 1;
      const activo = (estado.sectores_activos_bitmap || 0) & (1 << (s-1));
      const pct = (activo && estado.dur_total) ? Math.min(100, (estado.elapsed / estado.dur_total) * 100) : 0;
      return `
        <div class="tarjeta-sector" style="opacity:${activo?1:0.5}">
          ${estado.sector_trans === s ? '<div class="badge-p2">TRANS</div>' : ''}
          <div class="nombre">${salidas[String(s)]?.nombre || `Sector ${s}`}</div>
          <div class="circulo-wrap">
            <svg class="anillo-svg" viewBox="0 0 64 64"><circle class="anillo-track" cx="32" cy="32" r="27"/><circle class="anillo-fill" cx="32" cy="32" r="27" style="stroke-dashoffset:${169.6 * (1 - pct/100)}"/></svg>
            <div class="circulo-icono"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2m0 18c-4.4 0-8-3.6-8-8s3.6-8 8-8 8 3.6 8 8-3.6 8-8 8m3.5-9c.8 0 1.5-.7 1.5-1.5S16.3 8 15.5 8 14 8.7 14 9.5s.7 1.5 1.5 1.5m-7 0c.8 0 1.5-.7 1.5-1.5S9.3 8 8.5 8 7 8.7 7 9.5 7.7 11 8.5 11m3.5 6.5c2.3 0 4.3-1.3 5.4-3H6.1c1 1.7 3 3 5.4 3z"/></svg></div>
          </div>
          <div class="estado-texto">${pct.toFixed(0)}%</div>
        </div>
      `;
    }).join('');
  }

  function renderManual() {
    document.getElementById('gridManual').innerHTML = [...Array(NUM_SECTORES)].map((_,i) => {
      const s = i + 1;
      return `<button class="btn-sector-manual" onclick="this.classList.toggle('sel')">${salidas[String(s)]?.nombre || `Sector ${s}`}</button>`;
    }).join('');
  }

  function renderSalidas() {
    const card = document.getElementById('cardSalidas');
    card.innerHTML = `
      <h2>SALIDAS</h2>
      ${[...Array(NUM_SECTORES)].map((_,i) => {
        const s = i + 1;
        const sal = salidas[String(s)] || {nombre:`Sector ${s}`,tipo:0};
        return `
          <div class="salida-row">
            <input type="text" class="salida-nombre-inp" id="sal-nombre-${s}" value="${sal.nombre}">
            <select class="salida-tipo-sel" id="sal-tipo-${s}">${TIPOS_SALIDA.map((t,idx) => `<option value="${idx}" ${sal.tipo==idx?'selected':''}>${idx+1}. ${t}</option>`).join('')}</select>
          </div>
        `;
      }).join('')}
      <div style="margin-top:14px"><div style="font-size:12px;font-weight:600;margin-bottom:4px;color:var(--texto-tenue)">CAUDALÍMETROS</div>
      <div class="caudal-row"><label>Agua</label><select class="salida-tipo-sel" id="caudal-agua">${CAUDAL_AGUA_OPCIONES.map(o => `<option value="${o.value}">${o.label}</option>`).join('')}</select></div>
      <div class="caudal-row"><label>Fertilizante</label><select class="salida-tipo-sel" id="caudal-fert">${CAUDAL_FERT_OPCIONES.map(o => `<option value="${o.value}">${o.label}</option>`).join('')}</select></div></div>
      <div style="display:flex;gap:8px;margin-top:12px"><button class="btn-guardar" onclick="guardarSalidas()">Guardar Salidas</button></div>
    `;
  }

  window.guardarSalidas = function() {
    for (let s = 1; s <= NUM_SECTORES; s++) {
      const nombre = document.getElementById(`sal-nombre-${s}`)?.value || `Sector ${s}`;
      const tipo = parseInt(document.getElementById(`sal-tipo-${s}`)?.value) || 0;
      salidas[String(s)] = {nombre, tipo};
      pub(`SETSALIDA:${s},${tipo},${nombre}`, TOKEN_OP_);
    }
    mostrarToast('Salidas guardadas ✓');
  };

  function actualizarHistorial() {
    const list = document.getElementById('listaHistorial');
    if (historial.length === 0) {
      list.textContent = 'Sin registros.';
      return;
    }
    list.innerHTML = historial.map(r => {
      const prog = r.prog > 0 ? `Prog${r.prog}` : 'Manual';
      return `<div class="historial-entry">${String(r.dia).padStart(2,'0')}/${String(r.mes).padStart(2,'0')} ${String(r.hora).padStart(2,'0')}:${String(r.min).padStart(2,'0')} — ${salidas[String(r.sector)]?.nombre||`S${r.sector}`} — ${prog} — ${r.dur}s — ${r.m3.toFixed(1)}m³${r.fert?' 🧪':''}</div>`;
    }).join('');
  }

  window.riegoManual = function() {
    const sels = document.querySelectorAll('.btn-sector-manual.sel');
    if (sels.length === 0) { mostrarToast('Selecciona al menos un sector'); return; }
    const dur = parseInt(document.getElementById('duracionMin')?.value) || 10;
    const sectores = [...sels].map(s => [...document.querySelectorAll('.btn-sector-manual')].indexOf(s) + 1).join(',');
    pub(`MANUALRIEGO:${sectores},${dur}`, TOKEN_OP_);
    mostrarToast(`Riego manual iniciado (${dur} min)...`);
  };

  window.pausarReanudar = function() { pub(estado.pausa ? 'REANUDAR' : 'PAUSAR', TOKEN_OP_); };
  window.detenerPrograma = function() { pub('DETENER', TOKEN_OP_); };

  function fmtSeg(s) {
    const m = Math.floor(s/60); const ss = s % 60;
    return `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
  }

  function mostrarToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('visible');
    setTimeout(() => t.classList.remove('visible'), 2500);
  }

  document.getElementById('btnVolver').onclick = () => window.location.href = 'unidades.html';
  renderManual();
  setInterval(() => pub('GETESTADO', TOKEN_OBS_), 3000);
  setInterval(() => pub('GETSALIDAS', TOKEN_OBS_), 10000);

</script>

</body>
</html>
